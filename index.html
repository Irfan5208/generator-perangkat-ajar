<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Perangkat Ajar - SMK Al Hafidz Leuwiliang</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        pplg: {
                            main: '#1e3a8a', // blue-900
                            light: '#eff6ff',
                            accent: '#eab308' // yellow-500
                        },
                        mplb: {
                            main: '#7f1d1d', // red-900
                            light: '#fef2f2',
                            accent: '#eab308' // yellow-500
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .content-editable-area {
            min-height: 500px;
            padding: 2rem;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 0.5rem;
            outline: none;
        }
        .content-editable-area:focus {
            box-shadow: 0 0 0 2px #3b82f6;
        }
        
        /* Print/PDF Styles */
        .document-preview h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; border-bottom: 2px solid #ccc; padding-bottom: 0.5rem; }
        .document-preview h2 { font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #333; }
        .document-preview h3 { font-size: 1.1rem; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; }
        .document-preview p { margin-bottom: 0.75rem; line-height: 1.6; }
        .document-preview ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .document-preview ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .document-preview table { w-full; border-collapse: collapse; margin-bottom: 1rem; }
        .document-preview th, .document-preview td { border: 1px solid #d1d5db; padding: 0.5rem; text-align: left; }
        .document-preview th { background-color: #f3f4f6; font-weight: 600; }
        .document-preview .callout { background-color: #f8fafc; border-left: 4px solid #3b82f6; padding: 1rem; margin-bottom: 1rem; }
        
        /* LKPD specific styles within editor */
        .lkpd-box { border: 2px dashed #94a3b8; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; min-height: 100px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PROGRAM_KEAHLIAN = [
            { id: 'SEMUA', name: 'Semua Program Keahlian / Umum', theme: 'pplg' },
            { id: 'PPLG', name: 'Pengembangan Perangkat Lunak dan Gim', theme: 'pplg' },
            { id: 'MPLB', name: 'Manajemen Perkantoran dan Layanan Bisnis', theme: 'mplb' }
        ];

        const DIMENSI_LULUSAN = [
            "Keimanan & Ketakwaan", "Kewargaan", "Penalaran Kritis", "Kreativitas", 
            "Kolaborasi", "Kemandirian", "Kesehatan", "Komunikasi"
        ];

        const MODEL_PEMBELAJARAN = [
            "Project Based Learning (PjBL)", "Problem Based Learning (PBL)", 
            "Inkuiri", "Discovery Learning", "Teaching Factory (TeFa)"
        ];

        const SARPRAS_LIST = {
            'SEMUA': ['Lab Komputer', 'Proyektor', 'Whiteboard', 'Koneksi Internet', 'Buku Paket/Modul Cetak', 'Ruang Kelas Standar'],
            'PPLG': ['Lab Komputer', 'Koneksi Internet Cepat', 'Proyektor', 'Whiteboard', 'Software IDE (VS Code, dll)'],
            'MPLB': ['Lab Komputer', 'Mesin Tik/Printer', 'Proyektor', 'Telepon Simulasi', 'Alat Kearsipan', 'Internet']
        };

        const INITIAL_STATE = {
            guru: '',
            prodi: 'SEMUA',
            jenisMapel: 'Umum', 
            kelas: 'X',
            mapel: '',
            semester: 'Ganjil',
            pertemuan: '1',
            waktu: '2 x 45 menit',
            
            cp: '',
            topik: '',
            tp: '',
            levelHOTS: 'Campur',
            karakteristik: 'Sebagian besar peserta didik memiliki gaya belajar visual dan kinestetik, serta membutuhkan panduan konkret sebelum melakukan praktik mandiri.',
            sarpras: [],
            
            dimensi: [],
            model: 'Project Based Learning (PjBL)',
            isKolaborasi: false,
            mapelMitra: '',
            guruMitra: '',
            tpMitra: '',
            isuBersama: ''
        };

        const Icon = ({ name, size=24, className="" }) => {
            useEffect(() => {
                lucide.createIcons();
            });
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const Card = ({ children, className="" }) => (
            <div className={`bg-white rounded-xl shadow-md border border-gray-100 p-6 ${className}`}>
                {children}
            </div>
        );

        const generateContent = (data) => {
            const isPPLG = data.prodi === 'PPLG';
            const isMPLB = data.prodi === 'MPLB';
            const isSemua = data.prodi === 'SEMUA';
            
            // Kontekstualisasi Cerdas (Bahasa Inggris, Matematika, Kewirausahaan)
            let contextIndustri = '';
            const mapelLower = data.mapel.toLowerCase();

            if (mapelLower.includes('inggris')) {
                contextIndustri = isPPLG ? 'komunikasi teknis bahasa Inggris, membaca dokumentasi software (API/Library), dan presentasi proyek digital' : 
                                  isMPLB ? 'korespondensi bisnis internasional, percakapan layanan pelanggan, dan negosiasi bisnis' : 
                                  'komunikasi profesional dan pemahaman instruksi kerja di lingkungan industri standar';
            } else if (mapelLower.includes('matematika')) {
                contextIndustri = isPPLG ? 'logika algoritma, optimasi komputasi, dan analisis data dalam rekayasa perangkat lunak' : 
                                  isMPLB ? 'aritmatika bisnis, analisis statistik data perkantoran, dan penyusunan laporan keuangan' : 
                                  'pemecahan masalah kuantitatif dan analisis data operasional di tempat kerja';
            } else if (mapelLower.includes('wirausaha') || mapelLower.includes('pkk')) {
                contextIndustri = isPPLG ? 'pengembangan technopreneurship, pendirian startup digital, dan komersialisasi produk perangkat lunak/gim' : 
                                  isMPLB ? 'manajemen usaha layanan, inovasi proses bisnis perkantoran, dan strategi pemasaran jasa' : 
                                  'penciptaan peluang usaha, manajemen operasional bisnis, dan inovasi layanan berorientasi pasar';
            } else if (data.jenisMapel === 'Kejuruan') {
                contextIndustri = isPPLG ? 'pengembangan sistem perangkat lunak, siklus pemrograman, dan industri teknologi digital' :
                                  isMPLB ? 'administrasi perkantoran modern, manajemen kearsipan digital, dan operasional layanan bisnis' :
                                  'penerapan standar operasional prosedur (SOP) industri dan operasi teknis keahlian';
            } else {
                contextIndustri = 'penerapan soft-skills, etika profesional, dan penyelesaian masalah di lingkungan kerja yang adaptif';
            }
            
            const themeColor = isPPLG ? '#1e3a8a' : (isMPLB ? '#7f1d1d' : '#0f766e'); // Teal for Semua
            let dimList = data.dimensi.length > 0 ? data.dimensi.map(d => `<li><strong>${d}</strong>: Akan diamati dan dikembangkan melalui aktivitas kelompok dan refleksi.</li>`).join('') : '<li>Belum ditentukan secara spesifik, namun diarahkan pada Kemandirian dan Penalaran Kritis.</li>';
            
            const kolaborasiText = data.isKolaborasi ? `
                <h3>Kemitraan Pembelajaran (Inkuiri Kolaboratif)</h3>
                <div class="callout" style="border-color: #f59e0b; background-color: #fffbeb;">
                    <p>Modul ini menerapkan prinsip <strong>Inkuiri Kolaboratif</strong> (Permendikdasmen No.13/2025) secara terintegrasi lintas mata pelajaran.</p>
                    <ul>
                        <li><strong>Mata Pelajaran Mitra:</strong> ${data.mapelMitra} (Guru: ${data.guruMitra || '...' })</li>
                        <li><strong>Isu/Produk Bersama:</strong> ${data.isuBersama}</li>
                        <li><strong>Sinergi Tujuan:</strong> Siswa tidak hanya dituntut menguasai konsep ${data.topik}, tetapi juga mengaplikasikan capaian dari Mapel Mitra berupa: <em>"${data.tpMitra}"</em> ke dalam satu karya nyata.</li>
                    </ul>
                </div>
            ` : '<h3>Kemitraan Pembelajaran</h3><p>Pembelajaran dilakukan secara inkuiri mandiri di dalam kelas dengan mengoptimalkan interaksi <em>peer-learning</em> (tutor sebaya) antar siswa. Guru berperan sebagai fasilitator yang mengkurasi sumber belajar dan memandu refleksi.</p>';

            const indikatorHOTS = data.levelHOTS === 'HOTS' ? 
                ['Menganalisis', 'Mengevaluasi', 'Mencipta/Merancang'] : 
                data.levelHOTS === 'Campur' ? ['Menjelaskan', 'Menerapkan', 'Menganalisis'] : ['Menyebutkan', 'Mengidentifikasi', 'Menerapkan'];

            const alurKegiatan = (pertemuanKe) => `
                <table style="width: 100%; margin-bottom: 20px;">
                    <tr>
                        <td colspan="2" style="background-color: #f1f5f9; text-align: center;"><strong>PERTEMUAN ${pertemuanKe} (${data.waktu})</strong></td>
                    </tr>
                    <tr>
                        <td style="width: 20%; vertical-align: top;"><strong>A. Pendahuluan<br/>(15 Menit)</strong></td>
                        <td>
                            <ol>
                                <li><strong>Olah Hati & Mindful:</strong> Guru membuka dengan salam, doa bersama, dan memeriksa kondisi psikologis/kesiapan belajar peserta didik.</li>
                                <li><strong>Joyful:</strong> Memberikan apersepsi atau <em>ice-breaking</em> singkat berupa pertanyaan pemantik yang memancing rasa ingin tahu terkait ${data.topik}.</li>
                                <li><strong>Meaningful:</strong> Guru menyampaikan Tujuan Pembelajaran secara eksplisit, lalu mengaitkan mengapa materi ini sangat penting bagi karir masa depan mereka dalam hal <strong>${contextIndustri}</strong>.</li>
                            </ol>
                        </td>
                    </tr>
                    <tr>
                        <td style="vertical-align: top;"><strong>B. Kegiatan Inti<br/>(Alur Pembelajaran Mendalam)<br/>(60-90 Menit)</strong></td>
                        <td>
                            <p><strong>Tahap 1: Memahami (Eksplorasi Konsep)</strong></p>
                            <ul>
                                <li>Peserta didik menggali informasi mengenai ${data.topik} melalui bahan bacaan atau media digital (Pemanfaatan Digital).</li>
                                <li>Guru memberikan contoh kasus riil di industri.</li>
                            </ul>
                            <p><strong>Tahap 2: Mengaplikasi (Metode: ${data.model})</strong></p>
                            <ul>
                                <li>Peserta didik dibagi ke dalam kelompok kerja untuk memecahkan kasus/tantangan yang terdapat pada Lembar Kerja Peserta Didik (LKPD).</li>
                                <li>Aktivitas ini difokuskan pada keterampilan <strong>${indikatorHOTS[2]}</strong> terkait solusi yang tepat guna.</li>
                                ${data.isKolaborasi ? `<li><strong>Integrasi Kemitraan:</strong> Peserta didik memastikan solusi mereka juga mematuhi kriteria dari mapel <strong>${data.mapelMitra}</strong>.</li>` : ''}
                                <li>Guru melakukan observasi formatif berkeliling kelas (Olah Raga/Kesehatan Ergonomis dan Olah Pikir).</li>
                            </ul>
                            <p><strong>Tahap 3: Merefleksi (Evaluasi Proses)</strong></p>
                            <ul>
                                <li>Perwakilan kelompok mempresentasikan hasil rancangan/kerjanya.</li>
                                <li>Kelompok lain memberikan umpan balik (mengasah Dimensi Komunikasi dan Kolaborasi).</li>
                                <li>Guru memberikan penguatan konsep (klarifikasi miskonsepsi).</li>
                            </ul>
                        </td>
                    </tr>
                    <tr>
                        <td style="vertical-align: top;"><strong>C. Penutup<br/>(15 Menit)</strong></td>
                        <td>
                            <ol>
                                <li>Peserta didik bersama guru merangkum poin-poin utama pembelajaran hari ini.</li>
                                <li><strong>Mindful Check-out:</strong> Peserta didik mengisi instrumen self-assessment di akhir LKPD terkait apa yang mereka rasakan dan pelajari hari ini.</li>
                                <li>Penyampaian rencana tindak lanjut atau penugasan untuk pertemuan berikutnya.</li>
                            </ol>
                        </td>
                    </tr>
                </table>
            `;

            // 1. Modul Ajar (Detail Lengkap)
            const modulAjarHTML = `
                <div class="document-preview">
                    <h1 style="color: ${themeColor}; text-align: center; border-bottom: 3px solid ${themeColor}; padding-bottom: 10px;">MODUL AJAR - PEMBELAJARAN MENDALAM</h1>
                    
                    <h2 style="color: ${themeColor};">I. INFORMASI UMUM</h2>
                    <table style="width: 100%;">
                        <tr><td style="width: 25%;"><strong>Nama Guru / Penyusun</strong></td><td>: ${data.guru}</td></tr>
                        <tr><td><strong>Nama Sekolah</strong></td><td>: SMK Al Hafidz Leuwiliang</td></tr>
                        <tr><td><strong>Program Keahlian</strong></td><td>: ${data.prodi === 'PPLG' ? 'Pengembangan Perangkat Lunak & Gim' : data.prodi === 'MPLB' ? 'Manajemen Perkantoran & Layanan Bisnis' : 'Semua Program Keahlian'}</td></tr>
                        <tr><td><strong>Mata Pelajaran</strong></td><td>: ${data.mapel} (${data.jenisMapel})</td></tr>
                        <tr><td><strong>Fase / Kelas / Semester</strong></td><td>: Fase ${data.kelas.includes('X') ? 'E' : 'F'} / Kelas ${data.kelas.split(' ')[0]} / ${data.semester}</td></tr>
                        <tr><td><strong>Alokasi Waktu</strong></td><td>: ${data.pertemuan} Pertemuan (${data.waktu})</td></tr>
                        <tr><td><strong>Sarana & Prasarana</strong></td><td>: ${data.sarpras.join(', ') || 'Modul ajar, alat tulis, papan tulis'}</td></tr>
                        <tr><td><strong>Target Peserta Didik</strong></td><td>: ${data.karakteristik}</td></tr>
                        <tr><td><strong>Model Pembelajaran</strong></td><td>: ${data.model}</td></tr>
                    </table>

                    <h2 style="color: ${themeColor};">II. KOMPONEN INTI</h2>
                    
                    <h3>A. Capaian & Tujuan Pembelajaran</h3>
                    <div style="background-color: #f9fafb; padding: 15px; border-left: 5px solid ${themeColor}; margin-bottom: 15px;">
                        <p><strong>Elemen Capaian Pembelajaran (CP):</strong><br/>${data.cp || '<em>(Capaian Pembelajaran belum diisi)</em>'}</p>
                        <p><strong>Tujuan Pembelajaran (TP):</strong><br/>${data.tp}</p>
                    </div>
                    
                    <h3>B. Perwujudan Kerangka Pembelajaran Mendalam</h3>
                    <ul>
                        <li><strong>Berkesadaran (Mindful):</strong> Peserta didik senantiasa diajak menyadari posisi, tujuan, dan sikap mereka selama belajar. Momen refleksi dilakukan di awal dan akhir pembelajaran.</li>
                        <li><strong>Bermakna (Meaningful):</strong> Materi <em>${data.topik}</em> tidak berhenti sebagai teori hafalan, melainkan dikontekstualisasikan langsung dengan praktik di bidang <strong>${contextIndustri}</strong>.</li>
                        <li><strong>Menggembirakan (Joyful):</strong> Menggunakan metode ${data.model} yang interaktif. Pembelajaran mengasah "Olah Pikir" (analisis), "Olah Rasa" (kreativitas), "Olah Hati" (etika), dan "Olah Raga" (kesehatan kerja).</li>
                    </ul>
                    
                    <h3>C. Dimensi Lulusan (Profil Pelajar)</h3>
                    <ul>${dimList}</ul>
                    
                    ${kolaborasiText}

                    <h3>D. Pemahaman Bermakna & Pertanyaan Pemantik</h3>
                    <table style="width: 100%;">
                        <tr>
                            <th style="width: 50%;">Pemahaman Bermakna</th>
                            <th>Pertanyaan Pemantik</th>
                        </tr>
                        <tr>
                            <td>Menguasai konsep <strong>${data.topik}</strong> adalah fondasi kritikal agar peserta didik mampu beradaptasi, memecahkan masalah, dan berinovasi saat mereka terjun langsung ke dalam praktik ${contextIndustri}. Kesalahan pada konsep ini di dunia nyata dapat berakibat pada kegagalan proyek atau inefisiensi operasional.</td>
                            <td>"Pernahkah kalian membayangkan bagaimana jadinya jika sistem atau prosedur terkait ${data.topik} ini diabaikan oleh sebuah perusahaan besar? Menurut kalian, apa dampak terburuk yang bisa terjadi pada perusahaan maupun pelanggannya?"</td>
                        </tr>
                    </table>

                    <h3>E. Langkah-Langkah Pembelajaran</h3>
                    ${alurKegiatan(1)}
                    ${data.pertemuan === '2' ? alurKegiatan(2) : ''}

                    <h2 style="color: ${themeColor};">III. LAMPIRAN</h2>
                    <p><em>Dokumen terpisah melampirkan:</em></p>
                    <ol>
                        <li>Lembar Kerja Peserta Didik (LKPD)</li>
                        <li>Bahan Bacaan / Materi Ajar</li>
                        <li>Instrumen Asesmen (Rubrik Penilaian Sikap, Pengetahuan, dan Keterampilan)</li>
                    </ol>
                </div>
            `;

            // 2. LKPD (Desain Profesional untuk dikerjakan siswa)
            const lkpdHTML = `
                <div class="document-preview">
                    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
                        <h1 style="margin: 0; font-size: 1.6rem; text-transform: uppercase;">LEMBAR KERJA PESERTA DIDIK (LKPD)</h1>
                        <p style="margin: 5px 0 0 0;">Pembelajaran Mendalam Berbasis ${data.model}</p>
                    </div>
                    
                    <table style="width: 100%; margin-bottom: 20px; border: 1px solid #000;">
                        <tr>
                            <td style="width: 150px; font-weight: bold;">Topik / Materi</td><td>: ${data.topik}</td>
                            <td style="width: 150px; font-weight: bold;">Nama Kelompok</td><td>: .......................................</td>
                        </tr>
                        <tr>
                            <td style="font-weight: bold;">Mata Pelajaran</td><td>: ${data.mapel}</td>
                            <td style="font-weight: bold; vertical-align: top;" rowspan="2">Anggota</td>
                            <td style="vertical-align: top;" rowspan="2">: 1. ....................................<br/>  2. ....................................<br/>  3. ....................................<br/>  4. ....................................</td>
                        </tr>
                        <tr>
                            <td style="font-weight: bold;">Kelas / Semester</td><td>: ${data.kelas} / ${data.semester}</td>
                        </tr>
                    </table>

                    <div style="background-color: #f8fafc; border: 1px solid #cbd5e1; padding: 15px; margin-bottom: 20px;">
                        <strong>Tujuan Aktivitas:</strong><br/>
                        ${data.tp}<br/><br/>
                        <strong>Petunjuk Pengerjaan:</strong>
                        <ol style="margin-bottom: 0;">
                            <li>Bacalah skenario / permasalahan dengan teliti.</li>
                            <li>Lakukan diskusi kolaboratif bersama rekan satu kelompok. Hargai setiap pendapat (Joyful & Mindful).</li>
                            <li>Tuliskan rancangan solusi pada kolom yang disediakan dengan rapi.</li>
                        </ol>
                    </div>
                    
                    <h3 style="background-color: ${themeColor}; color: white; padding: 5px 10px;">TAHAP 1: MEMAHAMI (Mind & Concept)</h3>
                    <p>Diskusikan dengan kelompokmu! Berdasarkan literatur/sumber belajar yang telah kalian baca, jelaskan secara singkat pemahaman kalian mengenai poin-poin utama dari <strong>${data.topik}</strong>:</p>
                    <table style="width: 100%; height: 120px;">
                        <tr><td style="border: 1px dashed #000;"></td></tr>
                    </table>

                    <h3 style="background-color: ${themeColor}; color: white; padding: 5px 10px; margin-top: 20px;">TAHAP 2: MENGAPLIKASI (Problem Solving)</h3>
                    <p><strong>Skenario Studi Kasus Industri:</strong><br/>
                    Anda adalah tim profesional yang akan terjun di bidang ${contextIndustri}. Klien/Atasan Anda meminta Anda untuk memecahkan sebuah permasalahan riil terkait ${data.topik}.</p>
                    
                    ${data.isKolaborasi ? `<p style="background-color: #fef08a; padding: 10px; border-left: 4px solid #ca8a04;"><strong>Tantangan Tambahan (Kolaborasi Lintas Mapel):</strong> Pastikan solusi yang Anda buat juga mencakup pertimbangan dari mapel <strong>${data.mapelMitra}</strong>, yaitu terkait pemecahan masalah: <em>${data.isuBersama}</em>.</p>` : ''}
                    
                    <p><strong>Instruksi Tugas (${data.levelHOTS === 'HOTS' ? 'Level Menganalisis & Mencipta' : data.levelHOTS === 'Campur' ? 'Level Menerapkan & Menganalisis' : 'Level Mengingat & Menerapkan'}):</strong><br/>
                    ${data.levelHOTS === 'HOTS' ? 
                        '1. Identifikasi dan <strong>analisis</strong> akar masalah dari skenario di atas.<br/>2. <strong>Rancang dan ciptakan</strong> solusi/prosedur inovatif yang paling efektif untuk menyelesaikannya.' : 
                    data.levelHOTS === 'Campur' ? 
                        '1. <strong>Terapkan</strong> langkah-langkah baku yang telah dipelajari untuk menyelesaikan kasus.<br/>2. <strong>Analisislah</strong> kelebihan dan kekurangan dari langkah yang Anda ambil.' : 
                        '<strong>Terapkan</strong> secara langsung rumus atau prosedur operasional standar (SOP) untuk menyelesaikan permasalahan di atas secara berurutan dan tepat.'
                    }</p>
                    
                    <p><strong>Ruang Kerja / Hasil Rancangan Solusi:</strong></p>
                    <table style="width: 100%; height: 250px;">
                        <tr><td style="border: 1px dashed #000; vertical-align: top; padding: 10px;"><em style="color: #999;">Tuliskan/gambarkan langkah-langkah solusi kelompok Anda di sini...</em></td></tr>
                    </table>

                    <h3 style="background-color: ${themeColor}; color: white; padding: 5px 10px; margin-top: 20px;">TAHAP 3: MEREFLEKSI (Self-Assessment)</h3>
                    <p>Lakukan refleksi jujur (Mindful) terhadap proses belajar Anda hari ini dengan mencentang (√) pada kolom yang sesuai:</p>
                    <table style="width: 100%;">
                        <tr style="background-color: #eee;">
                            <th>Pernyataan Refleksi</th>
                            <th style="width:10%; text-align:center;">Ya</th>
                            <th style="width:10%; text-align:center;">Tidak</th>
                        </tr>
                        <tr><td>1. Saya kini memahami betapa pentingnya materi ini untuk karir saya ke depan.</td><td></td><td></td></tr>

                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Guru Mitra (Opsional)</label>
                                    <input type="text" name="guruMitra" value={formData.guruMitra} onChange={handleInputChange} className="w-full p-2 border rounded-md text-sm" placeholder="Nama guru mitra" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-700 mb-1">Isu/Produk Bersama (Titik Temu)</label>
                                <input type="text" name="isuBersama" value={formData.isuBersama} onChange={handleInputChange} className="w-full p-2 border rounded-md text-sm" placeholder="Contoh: Membuat proposal bisnis digital berbahasa Inggris" />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-700 mb-1">Tujuan Pembelajaran Mapel Mitra (Singkat)</label>
                                <input type="text" name="tpMitra" value={formData.tpMitra} onChange={handleInputChange} className="w-full p-2 border rounded-md text-sm" placeholder="Contoh: Siswa mampu menyusun teks prosedur bahasa Inggris." />
                            </div>
                        </div>
                    )}
                </div>
            );

            const renderStep4 = () => (
                <div className="space-y-4 fade-in">
                    <h2 className="text-xl font-bold mb-4">Langkah 4: Tinjauan & Generate</h2>
                    
                    <div className="bg-gray-50 p-5 rounded-lg border border-gray-200">
                        <h3 className="font-bold text-lg border-b pb-2 mb-3">Ringkasan Konfigurasi</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-y-2 text-sm">
                            <p><span className="text-gray-500">Guru:</span> {formData.guru || '-'}</p>
                            <p><span className="text-gray-500">Program:</span> {formData.prodi}</p>
                            <p><span className="text-gray-500">Kategori:</span> {formData.jenisMapel}</p>
                            <p><span className="text-gray-500">Mapel:</span> {formData.mapel || '-'}</p>
                            <p><span className="text-gray-500">Kelas/Smt:</span> {formData.kelas} / {formData.semester}</p>
                            <p><span className="text-gray-500">Topik:</span> {formData.topik || '-'}</p>
                            <p><span className="text-gray-500">Tingkat Soal:</span> {formData.levelHOTS}</p>
                            <p><span className="text-gray-500">Metode:</span> {formData.model}</p>
                            <p className="col-span-2"><span className="text-gray-500">Dimensi Lulusan:</span> {formData.dimensi.length > 0 ? formData.dimensi.join(', ') : 'Belum dipilih'}</p>
                            {formData.isKolaborasi && (
                                <p className="col-span-2 text-green-700 bg-green-50 p-2 rounded mt-2">
                                    <Icon name="link" size={14} className="inline mr-1" />
                                    Terintegrasi dengan <strong>{formData.mapelMitra || '...'}</strong> (Isu: {formData.isuBersama || '...'})
                                </p>
                            )}
                        </div>
                    </div>

                    <div className="flex justify-center pt-4">
                        <button 
                            onClick={handleGenerate}
                            disabled={isGenerating || !formData.guru || !formData.mapel || !formData.topik}
                            className={`flex items-center gap-2 px-8 py-4 rounded-xl text-white font-bold text-lg shadow-lg transform transition hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed ${themeClass}`}
                        >
                            {isGenerating ? (
                                <><Icon name="loader-2" className="animate-spin" /> Menyusun Dokumen AI...</>
                            ) : (
                                <><Icon name="sparkles" /> Buat Perangkat Ajar Lengkap</>
                            )}
                        </button>
                    </div>
                    {(!formData.guru || !formData.mapel || !formData.topik) && (
                        <p className="text-center text-red-500 text-sm mt-2">Harap lengkapi Nama Guru, Mapel, dan Topik terlebih dahulu.</p>
                    )}
                </div>
            );

            const renderResult = () => {
                if (!generatedContent) return null;

                const tabs = [
                    { id: 'modulAjar', label: 'Modul Ajar', icon: 'file-text' },
                    { id: 'lkpd', label: 'LKPD', icon: 'edit-3' },
                    { id: 'materi', label: 'Materi Ajar', icon: 'book-open' },
                    { id: 'asesmen', label: 'Asesmen', icon: 'check-square' }
                ];

                return (
                    <div className="w-full max-w-6xl mx-auto p-4 fade-in">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className={`text-2xl font-bold ${themeText}`}>Hasil Perangkat Ajar Pembelajaran Mendalam</h1>
                                <p className="text-gray-600">Topik: {formData.topik}</p>
                            </div>
                            <button onClick={() => setStep(1)} className="px-4 py-2 border rounded-md hover:bg-gray-100 flex items-center gap-2 text-sm">
                                <Icon name="home" size={16} /> Kembali ke Form
                            </button>
                        </div>

                        {/* Tabs Navigation */}
                        <div className="flex overflow-x-auto border-b border-gray-200 mb-6 bg-white rounded-t-lg shadow-sm px-2 pt-2">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-4 py-3 flex items-center gap-2 font-medium text-sm whitespace-nowrap border-b-2 transition-colors ${activeTab === tab.id ? `${themeBorder} ${themeText}` : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}
                                >
                                    <Icon name={tab.icon} size={18} />
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Tab Content Area */}
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            {/* Editor View */}
                            <div className="lg:col-span-3">
                                <Card className="p-0 overflow-hidden">
                                    <div className="bg-gray-50 border-b p-3 flex justify-between items-center text-sm text-gray-600">
                                        <span className="flex items-center gap-2"><Icon name="edit" size={14}/> Pratinjau Dokumen (Bisa diedit langsung)</span>
                                    </div>
                                    <div 
                                        key={activeTab} // CRITICAL FIX: Ensures React remounts when tab changes to avoid blank/corrupted state
                                        id={`doc-${activeTab}`}
                                        className="content-editable-area" 
                                        contentEditable={true}
                                        suppressContentEditableWarning={true}
                                        dangerouslySetInnerHTML={{ __html: editedContentRef.current[activeTab] || generatedContent[activeTab] }}
                                        onInput={(e) => {
                                            // Save edits back to ref instantly so they aren't lost when switching tabs
                                            editedContentRef.current[activeTab] = e.currentTarget.innerHTML;
                                        }}
                                    />
                                </Card>
                            </div>

                            {/* Sidebar Actions */}
                            <div className="space-y-4">
                                <Card>
                                    <h3 className="font-semibold text-gray-800 mb-4 border-b pb-2">Aksi Dokumen</h3>
                                    
                                    <button onClick={() => downloadDOCX(`doc-${activeTab}`, `${tabs.find(t=>t.id===activeTab).label}_${formData.topik.replace(/\s+/g, '_')}`)} className={`w-full mb-3 flex items-center justify-center gap-2 px-4 py-2 rounded-md text-white shadow hover:opacity-90 ${themeClass}`}>
                                        <Icon name="download" size={18} /> Unduh DOCX (Word)
                                    </button>
                                    
                                    <button onClick={() => copyToClipboard(`doc-${activeTab}`)} className="w-full mb-3 flex items-center justify-center gap-2 px-4 py-2 border rounded-md hover:bg-gray-50 text-gray-700">
                                        <Icon name="copy" size={18} /> Salin Teks
                                    </button>

                                    <div className="mt-6 pt-4 border-t">
                                        <p className="text-xs text-gray-500 mb-2">Hasil kurang pas?</p>
                                        <button onClick={() => {
                                            alert("Di versi ini, Anda bisa langsung mengetik dan mengedit teks pada kotak dokumen di sebelah kiri layaknya Microsoft Word.");
                                        }} className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-purple-50 text-purple-700 border border-purple-200 rounded-md hover:bg-purple-100 text-sm">
                                            <Icon name="edit-2" size={14} /> Edit Manual di Kanvas
                                        </button>
                                    </div>
                                </Card>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className={`min-h-screen pb-12 transition-colors duration-500 ${step === 5 ? 'bg-gray-100' : 'bg-gradient-to-br from-gray-50 to-gray-200'}`}>
                    {/* Header */}
                    <header className={`text-white p-4 shadow-md ${themeClass}`}>
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center p-2 border-2 border-white/30 backdrop-blur-sm shadow">
                                    <Icon name="graduation-cap" size={32} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="font-bold text-xl leading-tight">SMK Al Hafidz Leuwiliang</h1>
                                    <p className="text-sm opacity-90">Generator Perangkat Ajar - Pembelajaran Mendalam</p>
                                </div>
                            </div>
                            <div className="hidden md:block">
                                <span className={`text-xs font-semibold px-3 py-1 rounded-full bg-white/20 backdrop-blur-sm`}>
                                    Permendikdasmen No.13/2025 Ready
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    {step < 5 ? (
                        <main className="max-w-3xl mx-auto mt-8 px-4">
                            <div className="mb-6 flex justify-between items-center px-2">
                                <h2 className="text-gray-500 font-medium">Langkah {step} dari 4</h2>
                                <div className="flex gap-1">
                                    {[1,2,3,4].map(i => (
                                        <div key={i} className={`h-2 w-12 rounded-full transition-colors ${i === step ? themeClass : (i < step ? 'bg-green-400' : 'bg-gray-300')}`}></div>
                                    ))}
                                </div>
                            </div>

                            <Card className="relative overflow-hidden border-t-4" style={{borderTopColor: theme === 'pplg' ? '#eab308' : '#f59e0b'}}>
                                {step === 1 && renderStep1()}
                                {step === 2 && renderStep2()}
                                {step === 3 && renderStep3()}
                                {step === 4 && renderStep4()}

                                {/* Navigation Buttons */}
                                <div className="mt-8 pt-4 border-t flex justify-between">
                                    <button 
                                        onClick={() => setStep(s => Math.max(1, s - 1))}
                                        className={`px-4 py-2 border rounded text-gray-600 hover:bg-gray-50 flex items-center gap-2 ${step === 1 ? 'invisible' : ''}`}
                                    >
                                        <Icon name="arrow-left" size={16} /> Kembali
                                    </button>
                                    
                                    {step < 4 && (
                                        <button 
                                            onClick={() => setStep(s => Math.min(4, s + 1))}
                                            className={`px-6 py-2 rounded text-white flex items-center gap-2 ${themeClass} hover:opacity-90`}
                                        >
                                            Lanjut <Icon name="arrow-right" size={16} />
                                        </button>
                                    )}
                                </div>
                            </Card>
                        </main>
                    ) : (
                        renderResult()
                    )}

                    <style dangerouslySetInnerHTML={{__html: `
                        .fade-in { animation: fadeIn 0.4s ease-in-out; }
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                    `}} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
