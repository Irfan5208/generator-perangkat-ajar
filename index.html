<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Perangkat Ajar - SMK Al Hafidz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Styling khusus untuk Editor Dokumen */
        .doc-canvas {
            font-family: 'Times New Roman', Times, serif !important;
            font-size: 12pt !important;
            line-height: 1.5 !important;
            color: #000000 !important;
        }
        .doc-canvas h1, .doc-canvas h2, .doc-canvas h3, .doc-canvas h4 { 
            color: #000 !important; 
        }
        .doc-canvas table { border-collapse: collapse; width: 100%; }
        .doc-canvas th, .doc-canvas td { border: 1px solid black; padding: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const KEPALA_SEKOLAH = "Ikrima Dieniati Sudirman, S.Pd.";
        const NAMA_SEKOLAH = "SMK Al Hafidz Leuwiliang";

        const PRODI_INFO = {
            "Semua Kompetensi Keahlian": {
                ranah: "berbagai bidang keahlian dan industri",
                industri: "dunia usaha dan dunia industri (DUDI) yang relevan",
                profesi: "tenaga profesional tingkat menengah",
                tools: "perangkat kerja standar industri sesuai bidangnya",
                produk: "karya, layanan, atau produk sesuai standar mutu DUDI",
                mapelTerkait: "berbagai disiplin ilmu pendukung"
            },
            "PPLG": { 
                ranah: "rekayasa perangkat lunak dan pengembangan gim",
                industri: "startup teknologi, software house, studio pengembang gim, atau divisi IT",
                profesi: "Junior Programmer, Web Developer, Game Developer, atau QA Tester",
                tools: "Visual Studio Code, Git, Figma, serta framework pemrograman",
                produk: "aplikasi web, aplikasi mobile, prototipe gim, atau dokumen sistem",
                mapelTerkait: "Informatika / Dasar Kejuruan"
            },
            "MPLB": { 
                ranah: "administrasi perkantoran dan layanan bisnis",
                industri: "instansi pemerintah, biro administrasi, atau unit layanan pelanggan",
                profesi: "Staf Administrasi, Sekretaris, Customer Service, atau Office Manager",
                tools: "Microsoft Office/Google Workspace, sistem kearsipan digital",
                produk: "dokumen administrasi, arsip digital, atau layanan pelanggan unggul",
                mapelTerkait: "Ekonomi / Dasar Kejuruan"
            }
        };

        const DIMENSI_LULUSAN = [
            "Keimanan & Ketakwaan", "Kewargaan", "Penalaran Kritis", "Kreativitas", 
            "Kolaborasi", "Kemandirian", "Kesehatan", "Komunikasi"
        ];

        const SARPRAS_LIST = [
            'Lab Komputer/Praktik', 'Proyektor & Layar', 'Papan Tulis', 
            'Koneksi Internet', 'Buku Cetak/Modul', 'Alat Tulis/ATK', 'Perangkat Lunak Spesifik'
        ];

        function App() {
            const [step, setStep] = useState(1);
            const [isGenerating, setIsGenerating] = useState(false);
            const [showResult, setShowResult] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });
            const [activeSection, setActiveSection] = useState('doc_modul');

            const [formData, setFormData] = useState({
                guru: '',
                kompetensi: 'Semua Kompetensi Keahlian',
                kategoriMapel: 'Mata Pelajaran Umum',
                namaMapel: '',
                semester: 'Ganjil',
                kelas: 'X (Fase E)',
                pertemuan: 1,
                jp: 4,
                menit: 45,
                topik: '',
                elemenCp: [], 
                tp: '',
                karakteristik: '',
                sarpras: ['Proyektor & Layar', 'Papan Tulis'],
                dimensi: ['Penalaran Kritis', 'Kemandirian'],
                model: 'Project Based Learning (PjBL)',
                isKolaborasi: false,
                mapelMitra: '',
                deskripsiMitra: '',
                mitraLuar: ''
            });

            const [cpInput, setCpInput] = useState({ nama: '', desc: '' });

            const contentModulRef = useRef(null);
            const contentLkpdRef = useRef(null);
            const contentMateriRef = useRef(null);
            const contentAsesmenRef = useRef(null);

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            const handleArrayToggle = (name, value) => {
                setFormData(prev => {
                    const arr = prev[name];
                    if (arr.includes(value)) {
                        return { ...prev, [name]: arr.filter(i => i !== value) };
                    } else {
                        return { ...prev, [name]: [...arr, value] };
                    }
                });
            };

            const addCp = () => {
                if (cpInput.nama && cpInput.desc) {
                    setFormData(prev => ({
                        ...prev,
                        elemenCp: [...prev.elemenCp, cpInput]
                    }));
                    setCpInput({ nama: '', desc: '' });
                } else {
                    showToast('Nama dan Deskripsi Elemen CP harus diisi!', 'error');
                }
            };

            const removeCp = (index) => {
                setFormData(prev => ({
                    ...prev,
                    elemenCp: prev.elemenCp.filter((_, i) => i !== index)
                }));
            };

            const generateAutoTp = () => {
                if (!formData.topik) {
                    showToast('Silakan isi Topik Pembelajaran terlebih dahulu!', 'error');
                    return;
                }
                let tp = `1. Murid mampu menganalisis konsep dasar ${formData.topik} melalui pengamatan studi kasus secara mandiri.\n`;
                if (formData.pertemuan >= 2) {
                    tp += `2. Murid mampu merancang dan menyajikan solusi terkait ${formData.topik} sesuai standar operasional.\n`;
                }
                if (formData.pertemuan === 3) {
                    tp += `3. Murid mampu mengevaluasi dan memperbaiki hasil kerja ${formData.topik} berdasarkan umpan balik.`;
                } else {
                    tp += `2. Murid mampu mengaplikasikan penyelesaian masalah terkait ${formData.topik} dengan presisi.`;
                }
                setFormData(prev => ({ ...prev, tp: tp.trim() }));
                showToast('Tujuan Pembelajaran berhasil disusun otomatis.', 'success');
            };

            const showToast = (msg, type = 'success') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 3000);
            };

            const validateStep = (currentStep) => {
                if (currentStep === 1) {
                    if (!formData.guru) return "Nama Guru Penyusun wajib diisi!";
                    if (!formData.namaMapel) return "Nama Mata Pelajaran wajib diisi!";
                }
                if (currentStep === 2) {
                    if (!formData.topik) return "Topik Pembelajaran wajib diisi!";
                }
                if (currentStep === 3) {
                    if (formData.dimensi.length === 0) return "Pilih minimal 1 Dimensi Profil Lulusan!";
                    if (formData.isKolaborasi && !formData.mapelMitra) return "Nama Mata Pelajaran Mitra wajib diisi jika kolaborasi aktif!";
                }
                return null;
            };

            const nextStep = () => {
                const error = validateStep(step);
                if (error) { showToast(error, 'error'); return; }
                setStep(s => Math.min(4, s + 1));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const prevStep = () => {
                setStep(s => Math.max(1, s - 1));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const getContext = (type) => {
                const prodi = PRODI_INFO[formData.kompetensi];
                if (!prodi) return '';
                
                if (type === 'industri') return prodi.industri;
                if (type === 'profesi') return prodi.profesi;
                if (type === 'tools') return prodi.tools;
                if (type === 'produk') return prodi.produk;
                
                if (type === 'mapelAdaptifKonteks') {
                    const isPPLG = formData.kompetensi === 'PPLG';
                    const mapelName = formData.namaMapel.toLowerCase();
                    
                    if (mapelName.includes('inggris')) return isPPLG 
                        ? "membaca dokumentasi teknis, merancang panduan penggunaan aplikasi, dan komunikasi IT lintas bahasa" 
                        : "menyusun korespondensi bisnis, melayani klien asing, dan presentasi profesional perkantoran";
                    if (mapelName.includes('matematika')) return isPPLG 
                        ? "menerapkan logika komputasi, algoritma struktur data, dan analisis numerik" 
                        : "menghitung neraca keuangan sederhana, analisis statistik kinerja, dan pengolahan data spreadsheet";
                    if (mapelName.includes('kewirausahaan') || mapelName.includes('pkk')) return isPPLG 
                        ? "merancang model bisnis startup digital, monetisasi software, dan strategi peluncuran produk" 
                        : "merintis usaha jasa layanan administrasi, event organizer, dan strategi pemasaran jasa klien";
                    
                    return `penerapan standar dan disiplin keilmuan yang terintegrasi dengan kriteria mutu ${prodi.industri}`;
                }
                return '';
            };

            const generateAllContent = () => {
                setIsGenerating(true);
                
                setTimeout(() => {
                    const ctxIndustri = getContext('industri');
                    const ctxProfesi = getContext('profesi');
                    const ctxMapel = getContext('mapelAdaptifKonteks');
                    
                    const date = new Date();
                    const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
                    const strDate = `${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
                    const strTahunAjar = `${date.getFullYear()}/${date.getFullYear()+1}`;
                    
                    const totalMnt = parseInt(formData.jp) * parseInt(formData.menit);
                    const mntPendahuluan = Math.floor(totalMnt * 0.15);
                    const mntPenutup = Math.floor(totalMnt * 0.15);
                    const mntInti = totalMnt - mntPendahuluan - mntPenutup;
                    const mntPerTahapInti = Math.floor(mntInti / 3);

                    let cpListToUse = formData.elemenCp;
                    if (cpListToUse.length === 0) {
                        cpListToUse = [{
                            nama: "Elemen Pokok Mata Pelajaran", 
                            desc: "Murid mampu memahami dan menerapkan prosedur standar secara komprehensif. (Mohon diverifikasi dengan dokumen CP resmi terbaru)."
                        }];
                    }

                    const generatePertemuanHTML = (ke, judul) => `
                        <h4 style="margin-top:20px; font-weight:bold; background-color:#f1f5f9; padding:8px 12px; border-left:4px solid #000;">PERTEMUAN ${ke}: ${judul.toUpperCase()}</h4>
                        
                        <p style="margin-top:10px;"><strong>A. KEGIATAN PENDAHULUAN (BERKESADARAN, BERMAKNA, MENGGEMBIRAKAN – ${mntPendahuluan} MENIT)</strong></p>
                        <ul style="margin-bottom:15px; padding-left:20px; text-align:justify;">
                            <li>Guru membuka pelajaran dengan salam, memimpin doa, dan memeriksa kehadiran serta kesiapan ruang kelas.</li>
                            <li><strong>Berkesadaran (Mindful):</strong> Guru mengajak murid memfokuskan diri dan merefleksikan emosi awal. Guru mengajukan pertanyaan pemantik: <em>"Menurut kalian, mengapa penguasaan tentang ${formData.topik} ini menjadi penentu kegagalan atau keberhasilan di lingkungan ${ctxIndustri}?"</em></li>
                            <li><strong>Bermakna (Meaningful):</strong> Guru memaparkan garis besar materi dan menghubungkannya secara langsung dengan aktivitas nyata profesi ${ctxProfesi}.</li>
                            <li><strong>Menggembirakan (Joyful):</strong> Guru melakukan apersepsi ringan atau ice-breaking singkat yang relevan dengan istilah-istilah terkait ${formData.topik}.</li>
                            <li>Dilakukan asesmen diagnostik kognitif awal secara klasikal untuk memetakan pemahaman dasar.</li>
                        </ul>

                        <p><strong>B. KEGIATAN INTI (MEMAHAMI, MENGAPLIKASI, MEREFLEKSI – ${mntInti} MENIT)</strong></p>
                        <ul style="margin-bottom:15px; padding-left:20px; text-align:justify;">
                            <li><strong>Memahami (~${mntPerTahapInti} menit):</strong> Murid menggali informasi teori dasar mengenai konsep, struktur, dan standar <em>${formData.topik}</em> melalui bahan bacaan/modul. Mereka berdiskusi mendefinisikan masalah.</li>
                            <li><strong>Mengaplikasi (~${mntPerTahapInti} menit):</strong> Menggunakan pendekatan <strong>${formData.model}</strong>, murid dibagi dalam kelompok kerja. Mereka mulai mengonstruksi pemecahan masalah dengan mengerjakan Lembar Kerja (LKM) berupa rancangan simulasi/praktik <em>${getContext('produk')}</em>.</li>
                            <li><strong>Merefleksi (~${mntPerTahapInti} menit):</strong> Perwakilan kelompok menyajikan progres kerjanya. Kelompok lain dipancing untuk memberikan tanggapan kritis (peer-review) terkait ketepatan solusi yang ditawarkan.</li>
                        </ul>

                        <p><strong>C. KEGIATAN PENUTUP (UMPAN BALIK, KESIMPULAN, PERENCANAAN – ${mntPenutup} MENIT)</strong></p>
                        <ul style="padding-left:20px; text-align:justify;">
                            <li>Murid bersama guru menyimpulkan butir-butir krusial dari materi hari ini.</li>
                            <li>Guru memberikan umpan balik afirmatif terhadap dinamika kerja kolaboratif murid.</li>
                            <li>Guru menyampaikan rencana tindak lanjut ${ke === Number(formData.pertemuan) ? 'dan menutup keseluruhan seri pembelajaran dengan motivasi.' : `untuk tahap pengerjaan lanjutan pada Pertemuan ${ke+1}.`}</li>
                            <li>Penutupan kelas dan doa bersama.</li>
                        </ul>
                    `;

                    let langkahPertemuan = '';
                    if(Number(formData.pertemuan) >= 1) langkahPertemuan += generatePertemuanHTML(1, `Eksplorasi dan Identifikasi Masalah ${formData.topik}`);
                    if(Number(formData.pertemuan) >= 2) langkahPertemuan += generatePertemuanHTML(2, `Rancangan dan Implementasi Solusi ${formData.topik}`);
                    if(Number(formData.pertemuan) === 3) langkahPertemuan += generatePertemuanHTML(3, `Evaluasi, Presentasi Final, dan Perbaikan ${formData.topik}`);

                    const htmlModul = `
                        <h1 style="text-align: center; font-size: 16pt; margin-bottom:5px;">MODUL AJAR DEEP LEARNING</h1>
                        <p style="text-align: center; font-weight: bold; margin-bottom: 25px;">MATA PELAJARAN: ${formData.namaMapel.toUpperCase()} — BAB: ${formData.topik.toUpperCase()}</p>
                        
                        <h3>A. IDENTITAS MODUL</h3>
                        <table style="width: 100%; margin-bottom: 20px;" border="1">
                            <tr><td style="width:25%; padding:5px;"><strong>Nama Sekolah</strong></td><td style="width:25%; padding:5px;">: ${NAMA_SEKOLAH}</td><td style="width:25%; padding:5px;"><strong>Tahun Pelajaran</strong></td><td style="width:25%; padding:5px;">: ${strTahunAjar}</td></tr>
                            <tr><td style="padding:5px;"><strong>Mata Pelajaran</strong></td><td style="padding:5px;">: ${formData.namaMapel}</td><td style="padding:5px;"><strong>Fase/Kelas/Semester</strong></td><td style="padding:5px;">: ${formData.kelas} / ${formData.semester}</td></tr>
                            <tr><td style="padding:5px;"><strong>Komp. Keahlian</strong></td><td style="padding:5px;">: ${formData.kompetensi}</td><td style="padding:5px;"><strong>Alokasi Waktu</strong></td><td style="padding:5px;">: ${totalMnt} Menit (${formData.pertemuan} Pertemuan)</td></tr>
                        </table>

                        <h3>B. IDENTIFIKASI KESIAPAN MURID</h3>
                        <p style="text-align: justify; margin-bottom:15px;">${formData.karakteristik || `Secara umum, murid diproyeksikan telah memiliki pengetahuan awam terkait pembelajaran. Namun, mereka membutuhkan panduan terstruktur, skenario nyata, dan pembiasaan berpikir sistematis untuk memahami kaidah teknis dari konsep utama ${formData.topik} secara presisi sebelum menerapkannya di lingkungan riil.`}</p>

                        <h3>C. KARAKTERISTIK MATERI PELAJARAN</h3>
                        <p style="text-align: justify; margin-bottom:15px;">Materi <strong>${formData.topik}</strong> ini menitikberatkan pada pengembangan kemampuan konseptual dan prosedural terapan. Materi ini bersifat fundamental karena melatih kompetensi hardskill sekaligus mengasah penalaran tingkat tinggi (HOTS) terkait <em>${ctxMapel}</em>. Pembelajaran disusun secara berjenjang dari pemahaman teori hingga eksekusi solusi masalah riil yang biasa ditangani oleh <em>${ctxProfesi}</em> di <em>${ctxIndustri}</em>.</p>

                        <h3>D. DIMENSI PROFIL LULUSAN</h3>
                        <ul style="margin-bottom:20px; padding-left:20px; text-align:justify;">
                            ${formData.dimensi.map(dim => `<li style="margin-bottom:5px;"><strong>${dim}:</strong> Diwujudkan secara nyata manakala murid menganalisis dan menyelesaikan simulasi tantangan operasional terkait <em>${formData.topik}</em> serta mempertanggungjawabkan hasil keputusannya dalam interaksi sosial di kelas.</li>`).join('')}
                        </ul>

                        <h2 style="border-bottom: 2px solid #000; padding-bottom:5px; margin-top:30px;">DESAIN PEMBELAJARAN</h2>
                        
                        <h3>A. CAPAIAN PEMBELAJARAN (CP)</h3>
                        <table style="width: 100%; margin-bottom: 20px;" border="1">
                            <tr><th style="width:30%; padding:8px; background-color:#f3f4f6;">Elemen</th><th style="padding:8px; background-color:#f3f4f6;">Capaian Pembelajaran</th></tr>
                            ${cpListToUse.map(cp => `<tr><td style="padding:8px;"><strong>${cp.nama}</strong></td><td style="padding:8px; text-align:justify;">${cp.desc}</td></tr>`).join('')}
                        </table>

                        <h3>B. LINTAS DISIPLIN ILMU YANG RELEVAN (Inkuiri Kolaboratif)</h3>
                        <ul style="margin-bottom:20px; padding-left:20px; text-align:justify;">
                            ${formData.isKolaborasi ? `<li><strong>${formData.mapelMitra}</strong>: ${formData.deskripsiMitra || `Mendukung secara langsung pemahaman dan penyelesaian produk akhir materi ${formData.topik} dari perspektif disiplin ilmu yang berbeda untuk memperkaya analisis siswa.`}</li>` : `<li><em>Fokus pengembangan kompetensi ini difokuskan pada kedalaman bidang keahlian secara mandiri tanpa penugasan silang mata pelajaran lain secara eksplisit pada bab ini.</em></li>`}
                        </ul>

                        <h3>C. TUJUAN PEMBELAJARAN</h3>
                        <div style="border-left: 4px solid #000; padding: 12px; margin-bottom: 20px; background-color:#f9fafb;">
                            <p style="margin:0; line-height:1.6; text-align:justify;">${formData.tp.replace(/\n/g, '<br>')}</p>
                        </div>

                        <h3>D. KERANGKA PEMBELAJARAN</h3>
                        <ul style="margin-bottom:20px; padding-left:20px; text-align:justify;">
                            <li style="margin-bottom:8px;"><strong>Praktik Pedagogik:</strong> Menggunakan pendekatan berbasis <strong>${formData.model}</strong>.
                                <ul style="padding-left:20px; margin-top:5px; list-style-type:circle;">
                                    <li><em>Mindful Learning:</em> Murid dipancing senantiasa bernalar kritis dan metakognitif.</li>
                                    <li><em>Meaningful Learning:</em> Setiap studi kasus diarahkan pada simulasi aktivitas nyata <em>${ctxProfesi}</em>.</li>
                                    <li><em>Joyful Learning:</em> Ruang kelas dirancang secara interaktif yang membebaskan murid mengeksplorasi ide (fail-fast to learn).</li>
                                </ul>
                            </li>
                            <li style="margin-bottom:8px;"><strong>Kemitraan Pembelajaran:</strong> Interaksi intensif antar rekan sejawat. ${formData.mitraLuar ? `Terdapat kemitraan pengayaan dengan narasumber/praktisi eksternal yaitu: <strong>${formData.mitraLuar}</strong>.` : 'Memaksimalkan bimbingan fasilitatif dari guru mata pelajaran.'}</li>
                            <li style="margin-bottom:8px;"><strong>Pemanfaatan Digital:</strong> Mengoptimalkan instrumen seperti <strong>${getContext('tools')}</strong> untuk kelancaran proses simulasi dan eksplorasi data.</li>
                            <li><strong>Sarana Prasarana:</strong> ${formData.sarpras.join(', ')}.</li>
                        </ul>

                        <h3>E. LANGKAH-LANGKAH PEMBELAJARAN BERDIFERENSIASI</h3>
                        ${langkahPertemuan}

                        <br><br><br>
                        <table style="width: 100%; border: none !important; margin-top: 40px;" border="0">
                            <tr>
                                <td style="width: 50%; text-align: center; border: none !important;">
                                    Mengetahui,<br>
                                    Kepala SMK Al Hafidz Leuwiliang<br><br><br><br><br>
                                    <strong style="text-decoration:underline;">${KEPALA_SEKOLAH}</strong>
                                </td>
                                <td style="width: 50%; text-align: center; border: none !important;">
                                    Bogor, ${strDate}<br>
                                    Guru Mata Pelajaran<br><br><br><br><br>
                                    <strong style="text-decoration:underline;">${formData.guru}</strong>
                                </td>
                            </tr>
                        </table>
                    `;

                    const htmlLkpd = `
                        <h1 style="text-align: center; font-size: 16pt; margin-bottom:5px;">LEMBAR KERJA MURID (LKM)</h1>
                        <p style="text-align: center; font-weight: bold; margin-bottom: 25px;">STUDI KASUS: ${formData.topik.toUpperCase()}</p>
                        
                        <table style="width: 100%; margin-bottom: 25px;" border="1">
                            <tr>
                                <td style="width: 50%; padding:10px;"><strong>Mata Pelajaran:</strong> ${formData.namaMapel}<br><strong>Fase/Kelas:</strong> ${formData.kelas}<br><strong>Alokasi Waktu:</strong> ${totalMnt} Menit</td>
                                <td style="width: 50%; padding:10px;"><strong>Nama Kelompok:</strong> ....................................................<br><strong>Anggota:</strong><br>1. ........................................ 3. ........................................<br>2. ........................................ 4. ........................................</td>
                            </tr>
                        </table>

                        <div style="padding: 15px; border: 1px solid #000; margin-bottom: 25px;">
                            <strong>Petunjuk Pengerjaan (Mohon Dibaca!):</strong>
                            <ol style="margin-top:10px; padding-left:20px; text-align:justify;">
                                <li>Diskusikan bersama kelompok dengan suasana menyenangkan dan saling menghargai pendapat (Joyful).</li>
                                <li>Pahami bahwa keterampilan ini nyata dipakai di dunia <em>${ctxIndustri}</em> (Meaningful).</li>

                                                <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                                                    <label className="block text-sm font-bold text-slate-700 mb-2">Elemen & Capaian Pembelajaran (Opsional)</label>
                                                    <div className="flex flex-col sm:flex-row gap-3 mb-4">
                                                        <input type="text" value={cpInput.nama} onChange={e=>setCpInput({...cpInput, nama: e.target.value})} placeholder="Nama Elemen" className="w-full sm:w-1/3 p-3 border rounded-xl outline-none text-sm" />
                                                        <input type="text" value={cpInput.desc} onChange={e=>setCpInput({...cpInput, desc: e.target.value})} placeholder="Deskripsi CP..." className="w-full sm:w-2/3 p-3 border rounded-xl outline-none text-sm" />
                                                        <button type="button" onClick={addCp} className={`px-4 py-3 text-white rounded-xl ${themeBtn}`}><i className="fas fa-plus"></i></button>
                                                    </div>
                                                    
                                                    {formData.elemenCp.length > 0 && (
                                                        <div className="bg-slate-50 border border-slate-200 rounded-lg overflow-hidden">
                                                            {formData.elemenCp.map((cp, idx) => (
                                                                <div key={idx} className="flex justify-between items-start p-3 border-b border-slate-200 text-sm">
                                                                    <div><span className="font-bold">{cp.nama}:</span> {cp.desc}</div>
                                                                    <button type="button" onClick={() => removeCp(idx)} className="text-red-500 p-1"><i className="fas fa-trash"></i></button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>

                                                <div>
                                                    <div className="flex justify-between items-end mb-2">
                                                        <label className="block text-sm font-bold text-slate-700">Tujuan Pembelajaran</label>
                                                        <button type="button" onClick={generateAutoTp} className={`text-xs px-3 py-1.5 rounded-lg flex items-center gap-1.5 text-white ${themeBtn}`}>
                                                            <i className="fas fa-wand-magic-sparkles"></i> Susun Otomatis
                                                        </button>
                                                    </div>
                                                    <textarea name="tp" value={formData.tp} onChange={handleInputChange} rows="4" className="w-full p-4 border border-slate-300 rounded-xl outline-none leading-relaxed" placeholder="1. Murid mampu..."></textarea>
                                                </div>

                                                <div>
                                                    <label className="block text-sm font-bold text-slate-700 mb-2">Sarana Prasarana Tersedia</label>
                                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                        {SARPRAS_LIST.map(s => (
                                                            <label key={s} className="flex items-center gap-2 p-3 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50">
                                                                <input type="checkbox" checked={formData.sarpras.includes(s)} onChange={() => handleArrayToggle('sarpras', s)} className="w-4 h-4 rounded text-slate-800" />
                                                                <span className="text-sm font-medium text-slate-700">{s}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {step === 3 && (
                                            <div className="space-y-6">
                                                <div className="flex items-center gap-3 border-b border-slate-100 pb-3 mb-6">
                                                    <div className={`p-2 rounded-lg bg-slate-100 ${themeText}`}><i className="fas fa-layer-group text-lg"></i></div>
                                                    <h3 className="text-xl font-bold text-slate-800">Pendekatan Mendalam</h3>
                                                </div>

                                                <div>
                                                    <label className="block text-sm font-bold text-slate-700 mb-3">Dimensi Profil Lulusan</label>
                                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                        {DIMENSI_LULUSAN.map(d => (
                                                            <label key={d} className={`flex items-center justify-center p-3 border-2 rounded-xl cursor-pointer ${formData.dimensi.includes(d) ? `border-slate-800 bg-slate-800 text-white font-bold shadow-md` : `border-slate-200 text-slate-600 font-medium`}`}>
                                                                <input type="checkbox" className="hidden" checked={formData.dimensi.includes(d)} onChange={() => handleArrayToggle('dimensi', d)} />
                                                                <span className="text-sm text-center">{d}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <div>
                                                        <label className="block text-sm font-bold text-slate-700 mb-2">Model Pembelajaran</label>
                                                        <select name="model" value={formData.model} onChange={handleInputChange} className="w-full p-4 border border-slate-300 rounded-xl outline-none bg-white">
                                                            <option value="Project Based Learning (PjBL)">Project Based Learning (PjBL)</option>
                                                            <option value="Problem Based Learning (PBL)">Problem Based Learning (PBL)</option>
                                                            <option value="Teaching Factory (TEFA)">Teaching Factory (TEFA)</option>
                                                            <option value="Discovery Learning">Discovery Learning</option>
                                                            <option value="Inkuiri Terbimbing">Inkuiri Terbimbing</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-bold text-slate-700 mb-2">Kemitraan (Narasumber/Industri)</label>
                                                        <input type="text" name="mitraLuar" value={formData.mitraLuar} onChange={handleInputChange} className="w-full p-4 border border-slate-300 rounded-xl outline-none" placeholder="Opsional (Mis: Praktisi Industri)" />
                                                    </div>
                                                </div>

                                                <div className="bg-slate-100 border border-slate-200 rounded-2xl overflow-hidden">
                                                    <div className="px-5 py-4 flex justify-between items-center">
                                                        <div>
                                                            <h4 className="font-bold text-slate-800">Inkuiri Kolaboratif (Lintas Mapel)</h4>
                                                            <p className="text-xs text-slate-500 mt-1">Integrasi produk/solusi dengan mapel lain</p>
                                                        </div>
                                                        <label className="relative inline-flex items-center cursor-pointer">
                                                            <input type="checkbox" name="isKolaborasi" checked={formData.isKolaborasi} onChange={handleInputChange} className="sr-only peer" />
                                                            <div className="w-11 h-6 bg-slate-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-slate-800"></div>
                                                        </label>
                                                    </div>
                                                    
                                                    {formData.isKolaborasi && (
                                                        <div className="p-5 border-t border-slate-200 space-y-4">
                                                            <div>
                                                                <label className="block text-sm font-bold text-slate-800 mb-1">Mata Pelajaran Mitra (Bebas Ketik)</label>
                                                                <input type="text" name="mapelMitra" value={formData.mapelMitra} onChange={handleInputChange} className="w-full p-3 border border-slate-300 rounded-xl outline-none" placeholder="Ketik nama mapel mitra..." />
                                                            </div>
                                                            <div>
                                                                <label className="block text-sm font-bold text-slate-800 mb-1">Deskripsi Keterkaitan</label>
                                                                <textarea name="deskripsiMitra" value={formData.deskripsiMitra} onChange={handleInputChange} rows="2" className="w-full p-3 border border-slate-300 rounded-xl outline-none text-sm" placeholder="Bagaimana mapel mitra melengkapi proyek/materi ini?"></textarea>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        {step === 4 && (
                                            <div className="space-y-6 text-center py-8">
                                                <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 bg-slate-100 ${themeText}`}>
                                                    <i className="fas fa-square-check text-4xl"></i>
                                                </div>
                                                <h3 className="text-3xl font-black text-slate-800">Review Data & Proses</h3>
                                                <p className="text-slate-500 max-w-lg mx-auto">Sistem siap menyusun dokumen utuh (Modul, LKPD, Materi, Asesmen) yang diformat profesional (Times New Roman 12pt).</p>
                                                
                                                <div className="bg-slate-50 border border-slate-200 p-6 rounded-2xl text-left max-w-2xl mx-auto mt-8 grid grid-cols-2 gap-y-4 text-sm">
                                                    <div className="col-span-2 md:col-span-1"><span className="text-slate-500 block mb-1">Mapel:</span> <strong className="text-lg">{formData.namaMapel}</strong></div>
                                                    <div className="col-span-2 md:col-span-1"><span className="text-slate-500 block mb-1">Waktu:</span> <strong className="text-lg">{formData.pertemuan} Pertemuan</strong></div>
                                                    <div className="col-span-2"><span className="text-slate-500 block mb-1">Topik Utama:</span> <strong className="text-lg text-slate-800">{formData.topik}</strong></div>
                                                    <div className="col-span-2"><span className="text-slate-500 block mb-1">Model / Dimensi:</span> <strong>{formData.model}</strong> <br/>{formData.dimensi.join(', ')}</div>
                                                </div>

                                                <div className="pt-8">
                                                    <button type="button" onClick={generateAllContent} disabled={isGenerating} className={`w-full md:w-auto px-10 py-5 text-white text-lg font-bold rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3 mx-auto ${themeBtn}`}>
                                                        {isGenerating ? 'Menyusun Struktur Dokumen...' : <><i className="fas fa-file-lines text-xl"></i> Buat Perangkat Ajar Lengkap</>}
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex justify-between items-center pt-8 border-t border-slate-100 mt-8">
                                            <button type="button" onClick={prevStep} className={`px-6 py-3 font-bold rounded-xl flex items-center gap-2 text-slate-600 hover:bg-slate-100 ${step === 1 ? 'invisible' : ''}`}>
                                                <i className="fas fa-chevron-left"></i> Kembali
                                            </button>
                                            {step < 4 && (
                                                <button type="button" onClick={nextStep} className="px-8 py-3 bg-slate-900 text-white font-bold rounded-xl flex items-center gap-2 hover:bg-slate-800">
                                                    Lanjut <i className="fas fa-chevron-right"></i>
                                                </button>
                                            )}
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {}
                        {showResult && (
                            <div>
                                <div className="bg-white p-4 md:px-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-24 z-30 backdrop-blur-md bg-white/90">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-800">Pratinjau Dokumen Siap Ekspor</h2>
                                        <p className="text-sm text-slate-500">Anda dapat mengetik langsung di kanvas kertas untuk mengedit teks final.</p>
                                    </div>
                                    <div className="flex gap-3 w-full md:w-auto">
                                        <button onClick={() => {setShowResult(false); window.scrollTo({top:0});}} className="flex-1 md:flex-none px-4 py-2.5 border-2 border-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-50 flex items-center gap-2">
                                            <i className="fas fa-pen-to-square"></i> Edit Form
                                        </button>
                                        <button onClick={exportToDocx} className={`flex-1 md:flex-none px-6 py-2.5 text-white font-bold rounded-xl shadow-md flex items-center gap-2 ${themeBtn}`}>
                                            <i className="fas fa-download"></i> Unduh .doc (Word)
                                        </button>
                                    </div>
                                </div>

                                <div className="flex flex-col lg:flex-row gap-8 items-start">
                                    <aside className="hidden lg:block w-64 shrink-0 sticky top-48">
                                        <div className="bg-white rounded-2xl p-3 shadow-sm border border-slate-200">
                                            <div className="px-4 py-3 border-b border-slate-100 mb-2">
                                                <span className="font-bold text-slate-400 text-xs tracking-widest">DAFTAR ISI</span>
                                            </div>
                                            <nav className="flex flex-col gap-1">
                                                {[
                                                    {id: 'doc_modul', icon: 'fa-book-open', label: '1. Modul Ajar'},
                                                    {id: 'doc_lkpd', icon: 'fa-clipboard-list', label: '2. LKM'},
                                                    {id: 'doc_materi', icon: 'fa-file-lines', label: '3. Materi Ajar'},
                                                    {id: 'doc_asesmen', icon: 'fa-square-check', label: '4. Asesmen'}
                                                ].map(item => (
                                                    <button key={item.id} onClick={() => scrollToSection(item.id)} className={`text-left px-4 py-3 rounded-xl font-bold flex items-center gap-3 transition-colors ${activeSection === item.id ? `${themeBg} text-white shadow-md` : 'text-slate-600 hover:bg-slate-100'}`}>
                                                        <i className={`fas ${item.icon}`}></i> {item.label}
                                                    </button>
                                                ))}
                                            </nav>
                                        </div>
                                    </aside>

                                    <div className="flex-1 w-full space-y-12">
                                        {['doc_modul', 'doc_lkpd', 'doc_materi', 'doc_asesmen'].map((id, index) => {
                                            const refs = [contentModulRef, contentLkpdRef, contentMateriRef, contentAsesmenRef];
                                            return (
                                                <div id={id} key={id} className="relative group scroll-mt-32">
                                                    <div className="absolute -top-4 right-6 bg-slate-800 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity z-10">Bisa Diedit Manual</div>
                                                    <div 
                                                        ref={refs[index]}
                                                        className="doc-canvas bg-white p-8 md:p-12 lg:p-16 shadow-lg rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 min-h-[500px]"
                                                        contentEditable="true" 
                                                        suppressContentEditableWarning={true}
                                                        spellCheck="false"
                                                    />
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
