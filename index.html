<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Perangkat Ajar - Pembelajaran Mendalam</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Library Ekspor ke .DOCX Asli -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>

    <style>
        body { background-color: #f8fafc; }
        
        /* Styling Khusus Kanvas Kertas (Menyerupai Kertas MS Word) */
        .doc-canvas {
            font-family: 'Times New Roman', Times, serif !important;
            font-size: 12pt !important;
            line-height: 1.5 !important;
            color: #000000 !important;
            min-height: 800px;
            background-color: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        
        /* Heading Standard Document */
        .doc-canvas h1, .doc-canvas h2, .doc-canvas h3, .doc-canvas h4 { 
            color: #000 !important; 
            font-weight: bold;
        }
        
        /* Tabel Border Normal */
        .doc-canvas table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .doc-canvas th, .doc-canvas td { border: 1px solid black; padding: 6px 8px; vertical-align: top; }
        
        /* Tabel Borderless (Untuk Identitas & Pengesahan) */
        .doc-canvas table.borderless th, .doc-canvas table.borderless td {
            border: none !important;
            padding: 4px;
        }
        
        /* List */
        .doc-canvas ul, .doc-canvas ol { padding-left: 20px; text-align: justify; }
        .doc-canvas p { text-align: justify; margin-bottom: 10px; margin-top: 0; }
        
        /* Print/Export Page Break Simulation */
        .page-break-indicator {
            border-top: 2px dashed #cbd5e1;
            margin: 40px 0;
            position: relative;
            text-align: center;
        }
        .page-break-indicator::after {
            content: "Halaman Baru";
            background: #cbd5e1;
            color: #475569;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 10px;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
        }

        /* Hilangkan indikator saat print asli */
        @media print { .page-break-indicator { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const KEPALA_SEKOLAH = "Ikrima Dieniati Sudirman, S.Pd.";
        const NAMA_SEKOLAH = "SMK Al Hafidz Leuwiliang";

        const PRODI_INFO = {
            "Semua Kompetensi Keahlian": {
                ranah: "berbagai bidang keahlian dan industri",
                industri: "dunia usaha dan dunia industri (DUDI) yang relevan",
                profesi: "tenaga profesional tingkat menengah",
                tools: "perangkat kerja standar industri sesuai bidangnya",
                produk: "karya, layanan, atau produk sesuai standar mutu DUDI"
            },
            "PPLG": { 
                ranah: "rekayasa perangkat lunak dan pengembangan gim",
                industri: "startup teknologi, software house, studio pengembang gim, atau divisi IT perusahaan",
                profesi: "Junior Programmer, Web Developer, Game Developer, atau QA Tester",
                tools: "Visual Studio Code, Git & GitHub, Figma, serta bahasa/framework pemrograman",
                produk: "aplikasi web, aplikasi mobile, atau prototipe gim"
            },
            "MPLB": { 
                ranah: "administrasi perkantoran dan layanan bisnis",
                industri: "instansi pemerintah, biro administrasi, front office perusahaan, atau unit layanan pelanggan",
                profesi: "Staf Administrasi, Sekretaris, Customer Service, atau Office Manager",
                tools: "Microsoft Office/Google Workspace, sistem kearsipan digital, aplikasi korespondensi elektronik",
                produk: "dokumen administrasi, arsip digital, atau layanan pelanggan"
            }
        };

        const DIMENSI_LULUSAN = [
            "Keimanan & Ketakwaan", "Kewargaan", "Penalaran Kritis", "Kreativitas", 
            "Kolaborasi", "Kemandirian", "Kesehatan", "Komunikasi"
        ];

        function App() {
            const [step, setStep] = useState(1);
            const [isGenerating, setIsGenerating] = useState(false);
            const [showResult, setShowResult] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });
            
            // State untuk menyimpan konten HTML final agar tidak terhapus (Mengatasi Issue Kosong)
            const [generatedDocs, setGeneratedDocs] = useState({
                modul: '', lkpd: '', materi: '', asesmen: ''
            });

            const [formData, setFormData] = useState({
                guru: '',
                kompetensi: 'Semua Kompetensi Keahlian',
                kategoriMapel: 'Mata Pelajaran Umum',
                namaMapel: '',
                semester: 'Ganjil',
                kelas: 'X (Fase E)',
                pertemuan: 1,
                jp: 4,
                menit: 45,
                topik: '',
                elemenCp: [], 
                tp: '',
                karakteristik: '',
                sarpras: ['Koneksi Internet', 'Proyektor & Layar'],
                dimensi: ['Penalaran Kritis', 'Kolaborasi'],
                model: 'Project Based Learning (PjBL)',
                isKolaborasi: false,
                mapelMitra: '',
                deskripsiMitra: '',
                mitraLuar: ''
            });

            const [cpInput, setCpInput] = useState({ nama: '', desc: '' });

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            const handleArrayToggle = (name, value) => {
                setFormData(prev => {
                    const arr = prev[name];
                    return arr.includes(value) 
                        ? { ...prev, [name]: arr.filter(i => i !== value) }
                        : { ...prev, [name]: [...arr, value] };
                });
            };

            const addCp = () => {
                if (cpInput.nama && cpInput.desc) {
                    setFormData(prev => ({ ...prev, elemenCp: [...prev.elemenCp, cpInput] }));
                    setCpInput({ nama: '', desc: '' });
                }
            };
            const removeCp = (index) => {
                setFormData(prev => ({ ...prev, elemenCp: prev.elemenCp.filter((_, i) => i !== index) }));
            };

            const showToast = (msg, type = 'success') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 3000);
            };

            const nextStep = () => {
                if (step === 1 && (!formData.guru || !formData.namaMapel)) return showToast("Nama Guru dan Mapel wajib diisi!", "error");
                if (step === 2 && !formData.topik) return showToast("Judul/Topik Bab wajib diisi!", "error");
                setStep(s => Math.min(4, s + 1));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            const prevStep = () => { setStep(s => Math.max(1, s - 1)); window.scrollTo({ top: 0, behavior: 'smooth' }); };

            const getContext = (type) => {
                const prodi = PRODI_INFO[formData.kompetensi] || PRODI_INFO["Semua Kompetensi Keahlian"];
                if (['industri', 'profesi', 'tools', 'produk'].includes(type)) return prodi[type];
                
                if (type === 'mapelAdaptif') {
                    const mapelName = formData.namaMapel.toLowerCase();
                    const isPPLG = formData.kompetensi === 'PPLG';
                    
                    if (mapelName.includes('inggris')) return isPPLG 
                        ? "membaca dokumentasi teknis, instruksi perangkat lunak, dan korespondensi pengembangan IT" 
                        : "korespondensi bisnis, pelayanan klien, dan presentasi profesional perkantoran";
                    if (mapelName.includes('matematika')) return isPPLG 
                        ? "logika pemrograman, struktur data, dan analisis algoritmik dasar" 
                        : "perhitungan administrasi keuangan, pengolahan data spreadsheet, dan statistik kantor";
                    if (mapelName.includes('wirausaha') || mapelName.includes('pkk')) return isPPLG 
                        ? "model bisnis produk digital, monetisasi startup, dan Business Model Canvas software" 
                        : "perintisan usaha jasa administrasi, event organizer, dan strategi pemasaran layanan";
                    
                    return `implementasi standar kerja di ${prodi.industri}`;
                }
                return '';
            };

            const generateAllContent = () => {
                setIsGenerating(true);
                
                // Timeout digunakan untuk efek loading dan memastikan DOM siap
                setTimeout(() => {
                    const ctxIndustri = getContext('industri');
                    const ctxProfesi = getContext('profesi');
                    const ctxMapel = getContext('mapelAdaptif');
                    
                    const date = new Date();
                    const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
                    const strDate = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
                    const strTahunAjar = `${date.getFullYear()} / ${date.getFullYear()+1}`;
                    
                    const jpTotal = parseInt(formData.jp) * parseInt(formData.pertemuan);
                    
                    // Elemen Default jika kosong
                    let cpListToUse = formData.elemenCp.length > 0 ? formData.elemenCp : [
                        {nama: "Elemen Pokok", desc: "Murid mampu memahami, mengolah, dan mengevaluasi informasi serta menerapkan prosedur teknis yang sesuai dengan standar industri. (Catatan: Mohon sesuaikan dengan dokumen CP resmi terbaru)."}
                    ];

                    // Loop Pertemuan
                    let langkahPertemuan = '';
                    for (let i = 1; i <= formData.pertemuan; i++) {
                        let judulPertemuan = i === 1 ? `MENGIDENTIFIKASI DAN MENGANALISIS ${formData.topik.toUpperCase()}` :
                                             i === 2 ? `MERANCANG DAN MENYAJIKAN SOLUSI/PRODUK ${formData.topik.toUpperCase()}` :
                                                       `EVALUASI DAN TINDAK LANJUT ${formData.topik.toUpperCase()}`;
                        
                        langkahPertemuan += `
                            <p style="font-weight:bold; margin-top:15px; margin-bottom:5px;">PERTEMUAN ${i}: ${judulPertemuan}</p>
                            <p style="font-weight:bold; margin-bottom:5px;">KEGIATAN PENDAHULUAN (PEMBELAJARAN BERKESADARAN, BERMAKNA, MENGGEMBIRAKAN - 15 MENIT)</p>
                            <ul style="margin-bottom:10px;">
                                <li>Guru memulai pelajaran dengan salam dan menanyakan kabar murid.</li>
                                <li><strong>Berkesadaran (Mindful):</strong> Guru memancing koneksi emosional dan metakognisi. Guru bertanya: <em>"Menurut kalian, apa dampak positif jika kita benar-benar menguasai ${formData.topik} ini saat terjun di ${ctxIndustri} nanti?"</em></li>
                                <li><strong>Bermakna (Meaningful):</strong> Guru menjelaskan relevansi pembelajaran tentang ${formData.topik} dengan kehidupan sehari-hari dan tuntutan kompetensi profesi ${ctxProfesi}.</li>
                                <li><strong>Menggembirakan (Joyful):</strong> Guru mengadakan kuis interaktif singkat atau menayangkan video pemantik yang menarik perhatian murid mengenai tema hari ini.</li>
                                ${i === 1 ? '<li>Guru melakukan asesmen diagnostik awal dengan menanyakan secara lisan atau singkat mengenai pemahaman awal murid.</li>' : ''}
                            </ul>

                            <p style="font-weight:bold; margin-bottom:5px;">KEGIATAN INTI (MEMAHAMI, MENGAPLIKASI, MEREFLEKSI - ±${(formData.jp * formData.menit) - 30} MENIT)</p>
                            <ul style="margin-bottom:10px;">
                                <li><strong>Memahami (Understanding):</strong> Murid dibagi dalam kelompok. Mereka diminta mengeksplorasi literatur atau modul terkait <em>${formData.topik}</em>. Mereka mendiskusikan konsep inti dan batasan masalah.</li>
                                <li><strong>Mengaplikasi (Applying):</strong> Menggunakan model <strong>${formData.model}</strong>, murid mulai merancang output nyata. Mereka berkolaborasi menyelesaikan Lembar Kerja Murid (LKM) berupa penyusunan <em>${getContext('produk')}</em> terkait topik pembelajaran. Guru berkeliling memberikan bimbingan.</li>
                                <li><strong>Merefleksi (Reflecting):</strong> Beberapa kelompok mempresentasikan progres atau hasil akhirnya. Guru memfasilitasi diskusi dan memberikan umpan balik konstruktif mengenai kualitas hasil karya. Murid diminta menuliskan satu hal baru yang mereka pelajari.</li>
                            </ul>

                            <p style="font-weight:bold; margin-bottom:5px;">KEGIATAN PENUTUP (UMPAN BALIK, KESIMPULAN, PERENCANAAN - 15 MENIT)</p>
                            <ul style="margin-bottom:15px;">
                                <li>Guru memberikan umpan balik umum atas kinerja kelompok dan individu.</li>
                                <li>Guru bersama murid menyimpulkan poin-poin penting dari aktivitas hari ini.</li>
                                <li>Guru menyampaikan materi/tugas untuk pertemuan selanjutnya dan menutup kelas dengan doa.</li>
                            </ul>
                        `;
                    }

                    /* -------------------------------------------------------------
                       1. TEMPLATE MODUL AJAR (Disesuaikan Persis dgn Contoh Bab 1)
                    ------------------------------------------------------------- */
                    const htmlModul = `
                        <h1 style="text-align: center; font-size: 14pt; font-weight: bold; margin-bottom:0;">MODUL AJAR DEEP LEARNING</h1>
                        <h2 style="text-align: center; font-size: 12pt; font-weight: bold; margin-bottom:0;">MATA PELAJARAN : ${formData.namaMapel.toUpperCase()}</h2>
                        <h2 style="text-align: center; font-size: 12pt; font-weight: bold; margin-bottom:20px;">BAB 1 ${formData.topik.toUpperCase()}</h2>
                        
                        <p style="font-weight:bold; margin-bottom:5px;">A. IDENTITAS MODUL</p>
                        <table class="borderless" style="width: 100%; margin-bottom: 15px; margin-left: 15px;">
                            <tr><td style="width:30%;">Nama Sekolah</td><td style="width:2%;">:</td><td>${NAMA_SEKOLAH}</td></tr>
                            <tr><td>Mata Pelajaran</td><td>:</td><td>${formData.namaMapel}</td></tr>
                            <tr><td>Kelas / Fase / Semester</td><td>:</td><td>${formData.kelas.replace(' (', ' / ').replace(')','')} / ${formData.semester}</td></tr>
                            <tr><td>Alokasi Waktu</td><td>:</td><td>${jpTotal} Jam Pelajaran (${formData.pertemuan} Pertemuan @ ${formData.jp} JP)</td></tr>
                            <tr><td>Tahun Pelajaran</td><td>:</td><td>${strTahunAjar}</td></tr>
                        </table>

                        <p style="font-weight:bold; margin-bottom:5px;">B. IDENTIFIKASI KESIAPAN MURID</p>
                        <p style="margin-bottom:15px;">Murid pada umumnya telah memiliki pemahaman dasar tentang perangkat teknologi yang mereka gunakan sehari-hari. Latar belakang minat dan kebiasaan digital murid akan memengaruhi kecepatan penyerapan mereka terhadap materi <strong>${formData.topik}</strong>. Kebutuhan belajar yang mungkin muncul adalah peningkatan nalar komputasional/keterampilan teknis, kemampuan berpikir kritis dalam menghadapi masalah riil, serta pemahaman tentang etika dan standar kerja profesional.</p>

                        <p style="font-weight:bold; margin-bottom:5px;">C. KARAKTERISTIK MATERI PELAJARAN</p>
                        <p style="margin-bottom:15px;">Materi pelajaran ini berfokus pada pengembangan keterampilan, khususnya yang terkait dengan kemampuan konseptual, prosedural, dan metakognitif. Relevansi materi ini dengan kehidupan nyata murid sangat tinggi karena melibatkan langsung pembentukan kompetensi hardskill dan softskill yang disyaratkan oleh <em>${ctxIndustri}</em>. Tingkat kesulitan materi berjenjang, menuntut ketelitian serta pemahaman konteks. Materi ini akan mengintegrasikan nilai-nilai profesionalisme, daya juang, serta penguasaan <em>${ctxMapel}</em>.</p>

                        <p style="font-weight:bold; margin-bottom:5px;">D. DIMENSI PROFIL LULUSAN</p>
                        <p style="margin-bottom:5px;">Berdasarkan tujuan pembelajaran yang akan dicapai, dimensi lulusan yang dipilih adalah:</p>
                        <ul style="margin-bottom:20px;">
                            ${formData.dimensi.map(dim => `<li><strong>${dim}:</strong> Murid mampu memanifestasikan dimensi ini saat melakukan observasi, analisis data, dan proses penyelesaian tantangan kerja terkait ${formData.topik}.</li>`).join('')}
                        </ul>

                        <h2 style="text-align: center; font-size: 12pt; font-weight: bold; margin-bottom:15px;">DESAIN PEMBELAJARAN</h2>
                        
                        <p style="font-weight:bold; margin-bottom:5px;">A. CAPAIAN PEMBELAJARAN (CP) NOMOR : 32 TAHUN 2024</p>
                        <p style="margin-bottom:10px;">Capaian Pembelajaran elemen mata pelajaran ini adalah sebagai berikut.</p>
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                            <tr><th style="border: 1px solid black; padding: 5px; width: 30%;">Elemen</th><th style="border: 1px solid black; padding: 5px;">Capaian Pembelajaran</th></tr>
                            ${cpListToUse.map(cp => `<tr><td style="border: 1px solid black; padding: 5px;">${cp.nama}</td><td style="border: 1px solid black; padding: 5px;">${cp.desc}</td></tr>`).join('')}
                        </table>

                        <p style="font-weight:bold; margin-bottom:5px;">B. LINTAS DISIPLIN ILMU YANG RELEVAN</p>
                        <ul style="margin-bottom:15px;">
                            ${formData.isKolaborasi ? `<li><strong>${formData.mapelMitra}</strong>: ${formData.deskripsiMitra || 'Memahami konsep lanjutan yang terintegrasi secara teknis.'}</li>` : `<li><strong>Mata Pelajaran Produktif/Adaptif terkait</strong>: Keterkaitan wawasan dan logika terapan yang menunjang pemahaman utuh pada bidang keahlian.</li>`}
                        </ul>

                        <p style="font-weight:bold; margin-bottom:5px;">C. TUJUAN PEMBELAJARAN</p>
                        <div style="margin-bottom: 15px;">
                            <p style="margin-bottom:0;">${formData.tp.replace(/\n/g, '<br>')}</p>
                        </div>

                        <p style="font-weight:bold; margin-bottom:5px;">D. TOPIK PEMBELAJARAN KONTEKSTUAL</p>
                        <ul style="margin-bottom:15px;">
                            <li>Fondasi teori dan penerapan <em>${formData.topik}</em>.</li>
                            <li>Tantangan dan pemecahan masalah riil di lingkungan <em>${ctxIndustri}</em>.</li>
                            <li>Strategi efektif dan efisien dalam pengelolaan output kinerja.</li>
                        </ul>

                        <p style="font-weight:bold; margin-bottom:5px;">E. KERANGKA PEMBELAJARAN</p>
                        <p style="font-weight:bold; margin-bottom:0; text-decoration: underline;">PRAKTIK PEDAGOGIK (PENDEKATAN DEEP LEARNING):</p>
                        <p style="margin-bottom:5px;"><strong>Model:</strong> ${formData.model} – Murid akan diarahkan pada penguasaan materi melalui simulasi dan penyelesaian kasus/proyek riil.</p>
                        <p style="margin-bottom:5px;"><strong>Strategi:</strong></p>
                        <ul style="margin-bottom:10px;">
                            <li><strong>Mindful Learning:</strong> Mengajak murid menyadari pentingnya kedisiplinan dan nalar kritis. Murid dibiasakan mengevaluasi keputusan mereka sendiri saat merancang solusi operasional.</li>
                            <li><strong>Meaningful Learning:</strong> Menghubungkan setiap sesi praktik dengan simulasi alur kerja profesional layaknya seorang <em>${ctxProfesi}</em> yang sedang bertugas.</li>
                            <li><strong>Joyful Learning:</strong> Menciptakan suasana belajar interaktif tanpa tekanan, menumbuhkan budaya <em>fail-fast to learn</em> di mana kesalahan teknis adalah bagian dari eksplorasi penemuan solusi.</li>
                        </ul>
                        <p style="margin-bottom:15px;"><strong>Metode:</strong> Diskusi kelompok, presentasi, studi kasus, demonstrasi praktikal.</p>
                        
                        <p style="font-weight:bold; margin-bottom:0; text-decoration: underline;">KEMITRAAN PEMBELAJARAN:</p>
                        <ul style="margin-bottom:10px;">
                            <li><strong>Lingkungan Sekolah:</strong> Kolaborasi intensif antar rekan sebaya dan guru mata pelajaran pendukung.</li>
                            <li><strong>Lingkungan Luar:</strong> ${formData.mitraLuar ? `Melibatkan <strong>${formData.mitraLuar}</strong> untuk transfer wawasan industri.` : `Observasi standar kompetensi dari literatur dunia usaha/industri terkemuka.`}</li>
                        </ul>

                        <p style="font-weight:bold; margin-bottom:0; text-decoration: underline;">LINGKUNGAN BELAJAR & PEMANFAATAN DIGITAL:</p>
                        <ul style="margin-bottom:15px;">
                            <li>Ruang fisik/lab yang fleksibel, didukung pemanfaatan alat seperti <strong>${getContext('tools')}</strong>.</li>
                            <li>Platform virtual (LMS) untuk literasi digital, forum tanya-jawab, dan manajemen tugas.</li>
                        </ul>

                        <p style="font-weight:bold; margin-bottom:5px;">F. LANGKAH-LANGKAH PEMBELAJARAN BERDIFERENSIASI</p>
                        ${langkahPertemuan}

                        <p style="font-weight:bold; margin-bottom:5px;">G. ASESMEN PEMBELAJARAN</p>
                        <p style="margin-bottom:5px;"><strong>A. ASESMEN AWAL (DIAGNOSTIK):</strong> Observasi singkat untuk mengukur pengetahuan dasar tentang ${formData.topik}.</p>
                        <p style="margin-bottom:5px;"><strong>B. ASESMEN PROSES (FORMATIF):</strong> Penilaian unjuk kerja kelompok, pemantauan LKM, dan jurnal refleksi.</p>
                        <p style="margin-bottom:20px;"><strong>C. ASESMEN AKHIR (SUMATIF):</strong> Penilaian proyek akhir, rubrik keterampilan unjuk kerja, dan pemahaman teoritis komprehensif.</p>

                        <table class="borderless" style="width: 100%; border: none; margin-top: 50px;">
                            <tr>
                                <td style="width: 50%; text-align: center;">
                                    Mengetahui,<br>
                                    Kepala SMK Al Hafidz Leuwiliang<br><br><br><br><br>
                                    <strong style="text-decoration:underline;">${KEPALA_SEKOLAH}</strong>
                                </td>
                                <td style="width: 50%; text-align: center;">
                                    Bogor, ${strDate}<br>
                                    Guru Mata Pelajaran<br><br><br><br><br>
                                    <strong style="text-decoration:underline;">${formData.guru}</strong>
                                </td>
                            </tr>
                        </table>
                    `;

                    /* -------------------------------------------------------------
                       2. TEMPLATE LKPD / LKM
                    ------------------------------------------------------------- */
                    const htmlLkpd = `
                        <h1 style="text-align: center; font-size: 14pt; font-weight: bold; margin-bottom:0;">LEMBAR KERJA MURID (LKM)</h1>
                        <h2 style="text-align: center; font-size: 12pt; font-weight: bold; margin-bottom:20px;">TOPIK: ${formData.topik.toUpperCase()}</h2>

                                            <div className="text-center py-10 animate-[fadeIn_0.5s_ease-out]">
                                                <i className="fas fa-check-circle text-6xl text-slate-800 mb-4"></i>
                                                <h3 className="text-2xl font-black mb-2">Review & Proses</h3>
                                                <p className="text-slate-500 mb-8">Sistem siap menyusun 4 bagian dokumen (Modul, LKM, Materi, Asesmen) yang diformat menjadi 1 file DOCX utuh.</p>
                                                
                                                <button type="button" onClick={generateAllContent} disabled={isGenerating} className="px-10 py-4 bg-slate-800 text-white font-bold rounded-2xl shadow-lg text-lg hover:bg-slate-700">
                                                    {isGenerating ? 'Menyusun Dokumen...' : 'Buat Perangkat Ajar Lengkap'}
                                                </button>
                                            </div>
                                        )}

                                        {/* Navigasi Bawah */}
                                        <div className="flex justify-between pt-6 border-t mt-8">
                                            <button type="button" onClick={prevStep} className={`px-6 py-2 font-bold text-slate-500 ${step===1?'invisible':''}`}>Kembali</button>
                                            {step < 4 && <button type="button" onClick={nextStep} className="px-8 py-3 bg-slate-900 text-white font-bold rounded-xl">Lanjut</button>}
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* RESULT VIEW - SINGLE SCROLLABLE PAGE */}
                        {showResult && (
                            <div className="animate-[fadeIn_0.5s_ease-out]">
                                {/* Sticky Toolbar */}
                                <div className="bg-white p-4 rounded-2xl shadow-sm border mb-6 flex justify-between items-center sticky top-24 z-30">
                                    <div><h2 className="text-xl font-bold">Dokumen Siap Ekspor</h2><p className="text-sm text-slate-500">Klik langsung di dalam kertas putih untuk mengedit teks.</p></div>
                                    <div className="flex gap-3">
                                        <button onClick={()=>{setShowResult(false); window.scrollTo({top:0});}} className="px-4 py-2 border rounded-xl font-bold">Edit Form</button>
                                        <button onClick={handleExportDocx} className="px-6 py-2 bg-slate-800 text-white font-bold rounded-xl shadow-md"><i className="fas fa-download mr-2"></i> Unduh .DOCX</button>
                                    </div>
                                </div>

                                <div className="flex gap-8 items-start">
                                    {/* Sidebar Anchor */}
                                    <aside className="hidden lg:block w-56 sticky top-48 bg-white border p-3 rounded-2xl shadow-sm">
                                        <div className="text-xs font-bold text-slate-400 mb-2 px-2">DAFTAR ISI</div>
                                        <nav className="flex flex-col gap-1">
                                            {[
                                                {id: 'area_modul', label: '1. Modul Ajar'}, {id: 'area_lkpd', label: '2. LK Murid'}, 
                                                {id: 'area_materi', label: '3. Materi Ajar'}, {id: 'area_asesmen', label: '4. Asesmen'}
                                            ].map(item => (
                                                <button key={item.id} onClick={()=>scrollToId(item.id)} className="text-left px-3 py-2 text-sm font-bold text-slate-700 hover:bg-slate-100 rounded-lg">{item.label}</button>
                                            ))}
                                        </nav>
                                    </aside>

                                    {/* Scrollable Document Wrapper */}
                                    <div className="flex-1 space-y-4">
                                        <div className="bg-slate-200 p-2 rounded-xl text-center text-xs text-slate-500 font-bold tracking-widest"><i className="fas fa-arrow-down mr-1"></i> GULIR KE BAWAH UNTUK MELIHAT SEMUA HALAMAN <i className="fas fa-arrow-down ml-1"></i></div>
                                        
                                        {/* Bagian 1: Modul */}
                                        <div id="area_modul" className="relative group scroll-mt-32">
                                            <div className="absolute -top-3 right-5 bg-slate-800 text-white text-xs px-2 py-1 rounded-md opacity-0 group-hover:opacity-100 transition-opacity z-10"><i className="fas fa-pen text-[10px]"></i> Bisa Diedit</div>
                                            <div id="canvas_modul" className="doc-canvas p-10 md:p-16 outline-none" contentEditable="true" suppressContentEditableWarning={true} dangerouslySetInnerHTML={{ __html: generatedDocs.modul }} />
                                            <div className="page-break-indicator"></div>
                                        </div>

                                        {/* Bagian 2: LKPD */}
                                        <div id="area_lkpd" className="relative group scroll-mt-32">
                                            <div id="canvas_lkpd" className="doc-canvas p-10 md:p-16 outline-none" contentEditable="true" suppressContentEditableWarning={true} dangerouslySetInnerHTML={{ __html: generatedDocs.lkpd }} />
                                            <div className="page-break-indicator"></div>
                                        </div>

                                        {/* Bagian 3: Materi */}
                                        <div id="area_materi" className="relative group scroll-mt-32">
                                            <div id="canvas_materi" className="doc-canvas p-10 md:p-16 outline-none" contentEditable="true" suppressContentEditableWarning={true} dangerouslySetInnerHTML={{ __html: generatedDocs.materi }} />
                                            <div className="page-break-indicator"></div>
                                        </div>

                                        {/* Bagian 4: Asesmen */}
                                        <div id="area_asesmen" className="relative group scroll-mt-32">
                                            <div id="canvas_asesmen" className="doc-canvas p-10 md:p-16 outline-none" contentEditable="true" suppressContentEditableWarning={true} dangerouslySetInnerHTML={{ __html: generatedDocs.asesmen }} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
