<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Perangkat Ajar - SMK Al Hafidz Leuwiliang</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        pplg: {
                            main: '#1e3a8a', // blue-900
                            light: '#eff6ff',
                            accent: '#eab308' // yellow-500
                        },
                        mplb: {
                            main: '#7f1d1d', // red-900
                            light: '#fef2f2',
                            accent: '#eab308' // yellow-500
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .content-editable-area {
            min-height: 500px;
            padding: 2rem;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 0.5rem;
            outline: none;
        }
        .content-editable-area:focus {
            box-shadow: 0 0 0 2px #3b82f6;
        }
        
        /* Print/PDF Styles */
        .document-preview h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; border-bottom: 2px solid #ccc; padding-bottom: 0.5rem; }
        .document-preview h2 { font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #333; }
        .document-preview h3 { font-size: 1.1rem; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; }
        .document-preview p { margin-bottom: 0.75rem; line-height: 1.6; }
        .document-preview ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .document-preview ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .document-preview table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .document-preview th, .document-preview td { border: 1px solid #d1d5db; padding: 0.5rem; text-align: left; }
        .document-preview th { background-color: #f3f4f6; font-weight: 600; }
        .document-preview .callout { background-color: #f8fafc; border-left: 4px solid #3b82f6; padding: 1rem; margin-bottom: 1rem; }
        
        /* LKPD specific styles within editor */
        .lkpd-box { border: 2px dashed #94a3b8; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; min-height: 100px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PROGRAM_KEAHLIAN = [
            { id: 'PPLG', name: 'Pengembangan Perangkat Lunak dan Gim', theme: 'pplg' },
            { id: 'MPLB', name: 'Manajemen Perkantoran dan Layanan Bisnis', theme: 'mplb' }
        ];

        const DIMENSI_LULUSAN = [
            "Keimanan & Ketakwaan", "Kewargaan", "Penalaran Kritis", "Kreativitas", 
            "Kolaborasi", "Kemandirian", "Kesehatan", "Komunikasi"
        ];

        const MODEL_PEMBELAJARAN = [
            "Project Based Learning (PjBL)", "Problem Based Learning (PBL)", 
            "Inkuiri", "Discovery Learning", "Teaching Factory (TeFa)"
        ];

        const SARPRAS_LIST = {
            'PPLG': ['Lab Komputer', 'Koneksi Internet Cepat', 'Proyektor', 'Whiteboard', 'Software IDE (VS Code, dll)'],
            'MPLB': ['Lab Komputer', 'Mesin Tik/Printer', 'Proyektor', 'Telepon Simulasi', 'Alat Kearsipan', 'Internet']
        };

        const INITIAL_STATE = {
            guru: '',
            prodi: 'PPLG',
            jenisMapel: 'Kejuruan', // Default ke Kejuruan
            kelas: 'X',
            mapel: '',
            semester: 'Ganjil',
            pertemuan: '1',
            waktu: '2 x 45 menit',
            
            cp: '',
            topik: '',
            tp: '',
            levelHOTS: 'Campur', // Default level kognitif
            karakteristik: 'Sebagian besar siswa memiliki gaya belajar visual dan kinestetik.',
            sarpras: [],
            
            dimensi: [],
            model: 'Project Based Learning (PjBL)',
            isKolaborasi: false,
            mapelMitra: '',
            guruMitra: '',
            tpMitra: '',
            isuBersama: ''
        };

        const Icon = ({ name, size=24, className="" }) => {
            useEffect(() => {
                lucide.createIcons();
            });
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const Card = ({ children, className="" }) => (
            <div className={`bg-white rounded-xl shadow-md border border-gray-100 p-6 ${className}`}>
                {children}
            </div>
        );

        const generateContent = (data) => {
            const isPPLG = data.prodi === 'PPLG';
            
            // Penyesuaian konteks industri berdasarkan jenis mapel
            let contextIndustri = '';
            const mapelLower = data.mapel.toLowerCase();
            const isSpecialUmum = mapelLower.includes('inggris') || mapelLower.includes('matematika') || mapelLower.includes('wirausaha') || mapelLower.includes('pkk');

            if (data.jenisMapel === 'Kejuruan' || isSpecialUmum) {
                if (isPPLG) {
                    contextIndustri = mapelLower.includes('inggris') ? 'komunikasi profesional IT, membaca dokumentasi teknis, dan presentasi proyek digital' : 
                                      mapelLower.includes('matematika') ? 'logika komputasi, algoritma dasar, dan pemecahan masalah (problem solving) pada rekayasa perangkat lunak' :
                                      mapelLower.includes('wirausaha') || mapelLower.includes('pkk') ? 'membangun startup digital, technopreneurship, dan memasarkan produk perangkat lunak/gim' :
                                      'industri teknologi, pengembangan perangkat lunak, atau startup digital';
                } else {
                    contextIndustri = mapelLower.includes('inggris') ? 'komunikasi bisnis internasional, korespondensi email profesional, dan layanan pelanggan global' :
                                      mapelLower.includes('matematika') ? 'perhitungan bisnis, administrasi keuangan, dan analisis data statistik perkantoran' :
                                      mapelLower.includes('wirausaha') || mapelLower.includes('pkk') ? 'pengembangan bisnis layanan, manajemen usaha perkantoran, dan inovasi layanan pelanggan' :
                                      'dunia perkantoran modern, administrasi bisnis, atau layanan pelanggan profesional';
                }
            } else {
                contextIndustri = isPPLG ? 'kehidupan bermasyarakat, pengembangan soft-skills, dan problem solving dasar bagi lulusan IT' : 'kehidupan bermasyarakat, etika komunikasi dasar, dan kolaborasi bagi lulusan administrasi bisnis';
            }
            
            const themeColor = isPPLG ? '#1e3a8a' : '#7f1d1d';
            
            let dimList = data.dimensi.length > 0 ? data.dimensi.map(d => `<li><strong>${d}</strong>: Diintegrasikan melalui aktivitas pembelajaran.</li>`).join('') : '<li>Belum ditentukan</li>';
            
            const kolaborasiText = data.isKolaborasi ? `
                <h3>Kemitraan Pembelajaran (Inkuiri Kolaboratif)</h3>
                <p>Modul ini dirancang secara terintegrasi dengan mata pelajaran <strong>${data.mapelMitra}</strong> (Guru: ${data.guruMitra || '...'}).</p>
                <p><strong>Isu/Produk Bersama:</strong> ${data.isuBersama}</p>
                <p><strong>Peran Mapel Mitra:</strong> ${data.tpMitra}</p>
            ` : '<h3>Kemitraan Pembelajaran</h3><p>Pembelajaran dilakukan secara mandiri dalam mata pelajaran ini dengan mengoptimalkan interaksi guru-siswa dan siswa-siswa (peer-learning).</p>';

            const alurKegiatan = (pertemuanKe) => `
                <h4>Pertemuan ${pertemuanKe} (${data.waktu})</h4>
                <p><strong>A. Pendahuluan (15 Menit)</strong></p>
                <ul>
                    <li>Guru mengondisikan kelas dan membangun suasana <em>Joyful</em> (Menggembirakan) dengan sapaan hangat dan ice breaking singkat terkait ${data.topik}.</li>
                    <li>Menyampaikan Tujuan Pembelajaran dan menanamkan prinsip <em>Mindful</em> (Berkesadaran) dengan mengajak siswa merefleksikan pentingnya materi ini bagi karir mereka di ${contextIndustri}.</li>
                    <li>Apersepsi: Mengajukan pertanyaan pemantik.</li>
                </ul>
                <p><strong>B. Kegiatan Inti (Alur Pembelajaran Mendalam)</strong></p>
                <ul>
                    <li><strong>Tahap 1: Memahami (Understand)</strong> - Eksplorasi Konsep. Siswa difasilitasi untuk menggali informasi terkait ${data.topik} melalui sumber belajar digital atau paparan interaktif. Penekanan pada prinsip <em>Meaningful</em> dengan menautkan konsep ke contoh nyata.</li>
                    <li><strong>Tahap 2: Mengaplikasi (Apply)</strong> - Aktivitas Praktikal (${data.model}). Siswa bekerja dalam kelompok (mengembangkan dimensi Kolaborasi) untuk menyelesaikan tantangan/LKPD terkait ${data.topik}. ${data.isKolaborasi ? 'Siswa juga harus mempertimbangkan aspek dari mapel mitra ('+data.mapelMitra+').' : ''}</li>
                    <li><strong>Tahap 3: Merefleksi (Reflect)</strong> - Presentasi dan Umpan Balik. Siswa mempresentasikan hasil kerja. Guru memberikan penguatan dan siswa melakukan evaluasi diri terhadap proses belajarnya (Olah Pikir dan Olah Rasa).</li>
                </ul>
                <p><strong>C. Penutup (15 Menit)</strong></p>
                <ul>
                    <li>Guru dan siswa menyimpulkan pembelajaran.</li>
                    <li>Siswa mengisi instrumen refleksi singkat (Mindful).</li>
                    <li>Tindak lanjut dan informasi materi pertemuan berikutnya.</li>
                </ul>
            `;

            // 1. Generate Modul Ajar
            const modulAjarHTML = `
                <div class="document-preview">
                    <h1 style="color: ${themeColor}; text-align: center;">MODUL AJAR - PEMBELAJARAN MENDALAM</h1>
                    <table style="width: 100%; border: none; margin-bottom: 2rem;">
                        <tr>
                            <td style="border: none; padding: 4px;"><strong>Nama Penyusun</strong></td><td style="border: none;">: ${data.guru}</td>
                            <td style="border: none; padding: 4px;"><strong>Sekolah</strong></td><td style="border: none;">: SMK Al Hafidz Leuwiliang</td>
                        </tr>
                        <tr>
                            <td style="border: none; padding: 4px;"><strong>Program Keahlian</strong></td><td style="border: none;">: ${data.prodi === 'PPLG' ? 'Pengembangan Perangkat Lunak & Gim' : 'Manajemen Perkantoran & Layanan Bisnis'}</td>
                            <td style="border: none; padding: 4px;"><strong>Mata Pelajaran</strong></td><td style="border: none;">: ${data.mapel}</td>
                        </tr>
                        <tr>
                            <td style="border: none; padding: 4px;"><strong>Fase/Kelas</strong></td><td style="border: none;">: ${data.kelas} / Semester ${data.semester}</td>
                            <td style="border: none; padding: 4px;"><strong>Alokasi Waktu</strong></td><td style="border: none;">: ${data.pertemuan} Pertemuan (${data.waktu})</td>
                        </tr>
                    </table>

                    <h2>I. INFORMASI UMUM & PEDAGOGIS</h2>
                    <h3>1. Dimensi Profil Lulusan</h3>
                    <ul>${dimList}</ul>
                    
                    <h3>2. Perwujudan 3 Prinsip Pembelajaran Mendalam</h3>
                    <ul>
                        <li><strong>Berkesadaran (Mindful):</strong> Siswa akan diajak menyadari tujuan belajarnya melalui refleksi awal dan akhir pembelajaran, memahami peran kompetensi ini dalam karir masa depan mereka.</li>
                        <li><strong>Bermakna (Meaningful):</strong> Materi <em>${data.topik}</em> dikontekstualisasikan langsung dengan praktik di ${contextIndustri}, bukan sekadar hafalan teori.</li>
                        <li><strong>Menggembirakan (Joyful):</strong> Pembelajaran menggunakan metode ${data.model} yang interaktif, menantang (hands-on & minds-on), dan kolaboratif.</li>
                    </ul>

                    <h3>3. Komponen Kerangka Pembelajaran</h3>
                    <p><strong>Lingkungan Pembelajaran & Pemanfaatan Digital:</strong> Memanfaatkan ${data.sarpras.join(', ')} untuk menciptakan suasana simulasi kerja nyata.</p>
                    <p><strong>Integrasi:</strong> Menggabungkan Olah Pikir (analisis kasus), Olah Hati (etika profesi), Olah Rasa (kreativitas solusi), dan Olah Raga (kesehatan kerja/ergonomi).</p>
                    ${kolaborasiText}

                    <hr style="margin: 2rem 0; border: 1px solid #eee;" />

                    <h2>II. KOMPONEN INTI</h2>
                    <h3>1. Capaian & Tujuan Pembelajaran</h3>
                    <p><strong>Elemen CP:</strong> ${data.cp}</p>
                    <p><strong>Tujuan Pembelajaran:</strong> ${data.tp}</p>
                    
                    <h3>2. Pemahaman Bermakna & Pertanyaan Pemantik</h3>
                    <div class="callout">
                        <p><strong>Pemahaman Bermakna:</strong> Menguasai ${data.topik} adalah fondasi penting untuk beradaptasi dan berinovasi di ${contextIndustri}.</p>
                        <p><strong>Pertanyaan Pemantik:</strong> "Pernahkah kalian membayangkan bagaimana jika sistem terkait ${data.topik} ini gagal berfungsi di sebuah perusahaan besar? Apa dampaknya?"</p>
                    </div>

                    <h3>3. Langkah-langkah Pembelajaran</h3>
                    ${alurKegiatan(1)}
                    ${data.pertemuan === '2' ? alurKegiatan(2) : ''}

                    <h2>III. LAMPIRAN RINGKAS</h2>
                    <p><em>(Rincian LKPD, Materi, dan Asesmen terlampir pada dokumen terpisah)</em></p>
                </div>
            `;

            // 2. Generate LKPD
            const lkpdHTML = `
                <div class="document-preview">
                    <h1 style="color: ${themeColor}; text-align: center; font-size: 1.8rem; text-transform: uppercase;">Lembar Kerja Peserta Didik (LKPD)</h1>
                    <div style="border: 2px solid ${themeColor}; padding: 1rem; border-radius: 8px; margin-bottom: 2rem;">
                        <table style="width: 100%; border: none;">
                            <tr>
                                <td style="border: none; width: 120px;"><strong>Topik</strong></td><td style="border: none;">: ${data.topik}</td>
                                <td style="border: none; width: 120px;"><strong>Nama Kelompok</strong></td><td style="border: none;">: .......................................</td>
                            </tr>
                            <tr>
                                <td style="border: none;"><strong>Mata Pelajaran</strong></td><td style="border: none;">: ${data.mapel}</td>
                                <td style="border: none;"><strong>Nama Anggota</strong></td><td style="border: none;">: 1. ....................................</td>
                            </tr>
                            <tr>
                                <td style="border: none;"><strong>Kelas/Fase</strong></td><td style="border: none;">: ${data.kelas}</td>
                                <td style="border: none;"></td><td style="border: none;">  2. ....................................</td>
                            </tr>
                        </table>
                    </div>

                    <div class="callout">
                        <strong>Tujuan Aktivitas:</strong>
                        <p>${data.tp}</p>
                    </div>
                    
                    <h3>A. TAHAP 1: MEMAHAMI (Eksplorasi)</h3>
                    <p>Diskusikan dengan teman kelompokmu mengenai konsep dasar ${data.topik}. Tuliskan pemahaman utama kalian di bawah ini:</p>
                    <div class="lkpd-box">
                        <br/><br/><br/>
                    </div>

                    <h3>B. TAHAP 2: MENGAPLIKASI (Tantangan Praktik)</h3>
                    <p>Selesaikan studi kasus/proyek berikut (Metode: ${data.model}):</p>
                    <p><em>Skenario: Anda adalah seorang profesional/pelajar yang bersiap untuk terjun di ${contextIndustri}. Anda diminta untuk menyelesaikan permasalahan terkait ${data.topik}. ${data.isKolaborasi ? '<br/><strong>Instruksi Khusus (Kolaborasi):</strong> Pastikan solusi Anda juga mengintegrasikan aspek dari mata pelajaran '+data.mapelMitra+'.' : ''}</em></p>
                    
                    <div style="background: #f8fafc; border-left: 4px solid #f59e0b; padding: 10px; margin-bottom: 15px;">
                        <strong>Instruksi Kognitif (${data.levelHOTS === 'HOTS' ? 'Fokus Analisis & Evaluasi - HOTS' : data.levelHOTS === 'Campur' ? 'Pemahaman & Analisis' : 'Pemahaman & Penerapan Dasar - LOTS'}):</strong><br/>
                        ${data.levelHOTS === 'HOTS' ? 
                            'Analisislah permasalahan utama pada skenario di atas secara mendalam. Evaluasi minimal 2 alternatif solusi yang mungkin, lalu rancang/ciptakan solusi paling efektif yang bisa diimplementasikan.' : 
                        data.levelHOTS === 'Campur' ? 
                            '1. Jelaskan langkah-langkah dasar penyelesaian masalah ini.<br/>2. Analisislah apa dampaknya jika salah satu langkah penting diabaikan/gagal dilakukan.' : 
                            'Tuliskan penyelesaian langsung dari permasalahan di atas berdasarkan materi yang telah dibaca. Terapkan rumus/konsep baku yang ada dengan tepat dan sistematis.'
                        }
                    </div>

                    <p>Rancangan Solusi/Hasil Kerja:</p>
                    <div class="lkpd-box" style="min-height: 200px;">
                        <br/><br/><br/><br/><br/>
                    </div>

                    <h3>C. TAHAP 3: MEREFLEKSI (Self-Assessment)</h3>
                    <p>Beri tanda centang pada pernyataan yang paling sesuai dengan pengalaman belajarmu hari ini (Prinsip <em>Mindful</em>):</p>
                    <table style="width: 100%;">
                        <tr><th>Pernyataan</th><th style="width:50px;">Ya</th><th style="width:50px;">Tidak</th></tr>
                        <tr><td>Saya memahami peran kompetensi ini untuk masa depan saya.</td><td></td><td></td></tr>
                        <tr><td>Saya berkontribusi aktif dalam penyelesaian tugas kelompok.</td><td></td><td></td></tr>
                        <tr><td>Saya menemukan solusi kreatif untuk tantangan di Tahap 2.</td><td></td><td></td></tr>
                    </table>
                </div>
            `;

            // 3. Generate Materi
            const materiHTML = `
                <div class="document-preview">
                    <h1 style="color: ${themeColor};">BAHAN BACAAN & MATERI AJAR</h1>
                    <h2 style="margin-top: 0;">Topik: ${data.topik}</h2>
                    
                    <h3>1. Pengantar Konsep</h3>
                    <p>Materi <strong>${data.topik}</strong> merupakan salah satu kompetensi fundamental dalam ${data.mapel}. Dalam paradigma industri saat ini, penguasaan materi ini tidak sekadar tentang menghafal definisi, melainkan memahami bagaimana menerapkannya untuk efisiensi dan inovasi.</p>
                    
                    <div class="callout">
                        <strong>Konsep Kunci:</strong>
                        <ul>
                            <li>Definisi operasional dari ${data.topik}</li>
                            <li>Komponen-komponen utama yang terlibat</li>
                            <li>Prinsip kerja / Alur proses standar</li>
                        </ul>
                    </div>

                    <h3>2. Kontekstualisasi Dunia Kerja (${data.prodi})</h3>
                    <p>Di dunia nyata, khususnya pada ${contextIndustri}, konsep ini diimplementasikan dalam bentuk:</p>
                    <ul>
                        <li><strong>Contoh Kasus 1:</strong> Penerapan standar operasional dalam proyek berskala menengah.</li>
                        <li><strong>Contoh Kasus 2:</strong> Penggunaan perangkat digital / <em>tools</em> spesifik untuk mempercepat proses terkait ${data.topik}.</li>
                    </ul>

                    <h3>3. Glosarium</h3>
                    <ul>
                        <li><strong>Mindful:</strong> Pendekatan belajar yang penuh kesadaran.</li>
                        <li><strong>Joyful:</strong> Suasana belajar yang memicu antusiasme.</li>
                        <li><strong>${data.topik.split(' ')[0] || 'Istilah 1'}:</strong> <em>(Guru dapat menambahkan definisi teknis di sini)</em></li>
                    </ul>
                </div>
            `;

            // 4. Generate Asesmen
            const asesmenHTML = `
                <div class="document-preview">
                    <h1 style="color: ${themeColor};">INSTRUMEN ASESMEN</h1>
                    
                    <h3>A. Asesmen Formatif (Proses)</h3>
                    <p>Observasi selama alur Memahami - Mengaplikasi - Merefleksi.</p>
                    <table>
                        <tr>
                            <th>No</th>
                            <th>Nama Siswa</th>
                            <th>Aspek Pemahaman (Minds-on)</th>
                            <th>Aspek Aplikasi/Keterampilan (Hands-on)</th>
                            <th>Capaian Dimensi (${data.dimensi[0] || 'Kemandirian'})</th>
                        </tr>
                        <tr><td>1</td><td></td><td></td><td></td><td></td></tr>
                        <tr><td>2</td><td></td><td></td><td></td><td></td></tr>
                        <tr><td>3</td><td></td><td></td><td></td><td></td></tr>
                    </table>

                    <h3>B. Asesmen Sumatif (Kinerja / Produk)</h3>
                    <p><strong>Tugas:</strong> Berdasarkan penyelesaian LKPD pada tahap "Mengaplikasi", siswa dinilai menggunakan rubrik berikut.</p>
                    
                    <h4>Rubrik Penilaian</h4>
                    <table>
                        <tr>
                            <th>Kriteria</th>
                            <th>Sangat Baik (4)</th>
                            <th>Baik (3)</th>
                            <th>Cukup (2)</th>
                            <th>Perlu Bimbingan (1)</th>
                        </tr>
                        <tr>
                            <td><strong>Ketepatan Solusi</strong></td>
                            <td>Solusi sangat akurat dan melebihi ekspektasi standar ${contextIndustri}</td>
                            <td>Solusi akurat dan sesuai instruksi</td>
                            <td>Solusi sebagian besar akurat</td>
                            <td>Solusi tidak relevan</td>
                        </tr>
                        <tr>
                            <td><strong>Tingkat Kognitif (${data.levelHOTS})</strong></td>
                            <td>${data.levelHOTS === 'HOTS' ? 'Mampu menganalisis masalah kompleks dan merancang solusi inovatif (Mencipta)' : data.levelHOTS === 'Campur' ? 'Mampu menjelaskan konsep dan memberikan analisis yang logis (Menganalisis)' : 'Mampu menerapkan prosedur langkah demi langkah secara sempurna (Menerapkan)'}</td>

                                ) : (
                                    <Card className="flex flex-col items-center justify-center min-h-[400px] text-center bg-gray-50">
                                        <Icon name="monitor" size={64} className={`${themeText} mb-4 opacity-80`} />
                                        <h3 className="text-xl font-bold mb-2">Bahan Presentasi (PPT)</h3>
                                        <p className="text-gray-600 max-w-md mb-6">Sistem telah menyusun rancangan slide berisikan Tujuan, Apersepsi, Konsep, dan Aktivitas sesuai alur Pembelajaran Mendalam.</p>
                                        <button onClick={downloadPPT} className={`px-6 py-3 rounded-lg text-white font-semibold flex items-center gap-2 shadow hover:opacity-90 ${themeClass}`}>
                                            <Icon name="download" /> Unduh sebagai .PPTX
                                        </button>
                                    </Card>
                                )}
                            </div>

                            {/* Sidebar Actions */}
                            <div className="space-y-4">
                                <Card>
                                    <h3 className="font-semibold text-gray-800 mb-4 border-b pb-2">Aksi Dokumen</h3>
                                    
                                    {activeTab !== 'ppt' && (
                                        <>
                                            <button onClick={() => downloadPDF(`doc-${activeTab}`, `${tab.label}_${formData.topik}`)} className={`w-full mb-3 flex items-center justify-center gap-2 px-4 py-2 rounded-md text-white shadow hover:opacity-90 ${themeClass}`}>
                                                <Icon name="download" size={18} /> Unduh PDF
                                            </button>
                                            
                                            <button onClick={() => copyToClipboard(`doc-${activeTab}`)} className="w-full mb-3 flex items-center justify-center gap-2 px-4 py-2 border rounded-md hover:bg-gray-50 text-gray-700">
                                                <Icon name="copy" size={18} /> Salin Teks
                                            </button>
                                        </>
                                    )}

                                    {activeTab === 'ppt' && (
                                        <button onClick={downloadPPT} className={`w-full mb-3 flex items-center justify-center gap-2 px-4 py-2 rounded-md text-white shadow hover:opacity-90 ${themeClass}`}>
                                            <Icon name="download" size={18} /> Unduh PPTX
                                        </button>
                                    )}

                                    <div className="mt-6 pt-4 border-t">
                                        <p className="text-xs text-gray-500 mb-2">Hasil kurang pas?</p>
                                        <button onClick={() => {
                                            alert("Simulasi: Mengontak ulang AI (Engine)... Di versi ini, edit manual di kanvas disarankan untuk penyesuaian detail.");
                                        }} className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-purple-50 text-purple-700 border border-purple-200 rounded-md hover:bg-purple-100 text-sm">
                                            <Icon name="refresh-cw" size={14} /> Buat Ulang Bagian Ini
                                        </button>
                                    </div>
                                </Card>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className={`min-h-screen pb-12 transition-colors duration-500 ${step === 5 ? 'bg-gray-100' : 'bg-gradient-to-br from-gray-50 to-gray-200'}`}>
                    {/* Header */}
                    <header className={`text-white p-4 shadow-md ${themeClass}`}>
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center p-2 border-2 border-white/30 backdrop-blur-sm shadow">
                                    <Icon name="graduation-cap" size={32} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="font-bold text-xl leading-tight">SMK Al Hafidz Leuwiliang</h1>
                                    <p className="text-sm opacity-90">Generator Perangkat Ajar - Pembelajaran Mendalam</p>
                                </div>
                            </div>
                            <div className="hidden md:block">
                                <span className={`text-xs font-semibold px-3 py-1 rounded-full bg-white/20 backdrop-blur-sm`}>
                                    Permendikdasmen No.13/2025 Ready
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    {step < 5 ? (
                        <main className="max-w-3xl mx-auto mt-8 px-4">
                            <div className="mb-6 flex justify-between items-center px-2">
                                <h2 className="text-gray-500 font-medium">Langkah {step} dari 4</h2>
                                <div className="flex gap-1">
                                    {[1,2,3,4].map(i => (
                                        <div key={i} className={`h-2 w-12 rounded-full transition-colors ${i === step ? themeClass : (i < step ? 'bg-green-400' : 'bg-gray-300')}`}></div>
                                    ))}
                                </div>
                            </div>

                            <Card className="relative overflow-hidden border-t-4" style={{borderTopColor: theme === 'pplg' ? '#eab308' : '#f59e0b'}}>
                                {step === 1 && renderStep1()}
                                {step === 2 && renderStep2()}
                                {step === 3 && renderStep3()}
                                {step === 4 && renderStep4()}

                                {/* Navigation Buttons */}
                                <div className="mt-8 pt-4 border-t flex justify-between">
                                    <button 
                                        onClick={() => setStep(s => Math.max(1, s - 1))}
                                        className={`px-4 py-2 border rounded text-gray-600 hover:bg-gray-50 flex items-center gap-2 ${step === 1 ? 'invisible' : ''}`}
                                    >
                                        <Icon name="arrow-left" size={16} /> Kembali
                                    </button>
                                    
                                    {step < 4 && (
                                        <button 
                                            onClick={() => setStep(s => Math.min(4, s + 1))}
                                            className={`px-6 py-2 rounded text-white flex items-center gap-2 ${themeClass} hover:opacity-90`}
                                        >
                                            Lanjut <Icon name="arrow-right" size={16} />
                                        </button>
                                    )}
                                </div>
                            </Card>
                        </main>
                    ) : (
                        renderResult()
                    )}

                    <style dangerouslySetInnerHTML={{__html: `
                        .fade-in { animation: fadeIn 0.4s ease-in-out; }
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                    `}} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
